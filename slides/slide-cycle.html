<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉕ サイクル型(白×グリーン、循環図)
使うべきタイミング: PDCA・改善サイクル・循環プロセスなど、繰り返し回る仕組みを示したいとき。「サイクル」「循環」「PDCA」系の依頼。
向かないケース: 一方向で終わる手順(→⑥フロー型)
-->
<head>
<meta charset="UTF-8">
<title>サイクル型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }
  :root {
    --bg: #f8fbf8;
    --surface: #ffffff;
    --surface-2: #ecf7ee;
    --border: #dceae0;
    --ink: #14352a;
    --text: #3f5c50;
    --sub: #719183;
    --accent: #16a34a;
    --accent-2: #34d399;
    --grad: linear-gradient(120deg, #16a34a, #34d399);
  }
  .deco { position: absolute; border-radius: 50%; background: var(--accent); opacity: 0.05; pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 56px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 38px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 26px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .body { flex: 1; display: flex; gap: 48px; align-items: center; min-height: 0; margin-bottom: 22px; }
  .cycle-wrap { width: 420px; flex-shrink: 0; display: flex; justify-content: center; }
  .cycle-wrap svg { width: 400px; }

  .steps { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 22px;
    display: flex; gap: 16px; align-items: flex-start;
    box-shadow: 0 1px 3px rgba(20, 53, 42, 0.05);
  }
  .step-chip {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 800; color: #ffffff;
    flex-shrink: 0;
  }
  .step h3 { font-size: 15.5px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
  .step p { font-size: 13px; color: var(--sub); line-height: 1.6; }

  .footer {
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco" style="width: 420px; height: 420px; top: -170px; right: -130px;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Improvement Cycle</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">改善は、<em>週次</em>で回し続ける。</h1>

      <div class="body">
        <div class="cycle-wrap">
          <!--
            循環図の座標: 中心(200,200)、リング半径R=120、ノード半径52
            ノード中心: 上(200,80) 右(320,200) 下(200,320) 左(80,200)
            矢印弧: ノードの角度±23°を避け、θ=±64°..±26°を結ぶ
            点の式: (200+120cosθ, 200+120sinθ)
          -->
          <svg viewBox="0 0 400 400">
            <defs>
              <linearGradient id="cyc-g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#34d399"/>
              </linearGradient>
              <marker id="cyc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
              </marker>
            </defs>

            <!-- ベースの破線リング -->
            <circle cx="200" cy="200" r="120" fill="none" stroke="#d3e8da" stroke-width="2" stroke-dasharray="5 6"/>

            <!-- 弧の矢印(時計回り) -->
            <path d="M 252.6 92.1 A 120 120 0 0 1 307.9 147.4" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#cyc-arrow)"/>
            <path d="M 307.9 252.6 A 120 120 0 0 1 252.6 307.9" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#cyc-arrow)"/>
            <path d="M 147.4 307.9 A 120 120 0 0 1 92.1 252.6" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#cyc-arrow)"/>
            <path d="M 92.1 147.4 A 120 120 0 0 1 147.4 92.1" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#cyc-arrow)"/>

            <!-- ノード: 白フチ+グラデ円。テキストは 上段y=中心-2 / 下段y=中心+18 -->
            <circle cx="200" cy="80" r="52" fill="url(#cyc-g)" stroke="#ffffff" stroke-width="5"/>
            <text x="200" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Plan</text>
            <text x="200" y="98" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">計画</text>

            <circle cx="320" cy="200" r="52" fill="url(#cyc-g)" stroke="#ffffff" stroke-width="5"/>
            <text x="320" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Do</text>
            <text x="320" y="218" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">実行</text>

            <circle cx="200" cy="320" r="52" fill="url(#cyc-g)" stroke="#ffffff" stroke-width="5"/>
            <text x="200" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Check</text>
            <text x="200" y="338" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">検証</text>

            <circle cx="80" cy="200" r="52" fill="url(#cyc-g)" stroke="#ffffff" stroke-width="5"/>
            <text x="80" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Action</text>
            <text x="80" y="218" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">改善</text>

            <!-- 中央ラベル -->
            <text x="200" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#14352a">週次で回す</text>
            <text x="200" y="220" text-anchor="middle" font-size="12.5" fill="#719183">高速サイクル</text>
          </svg>
        </div>

        <div class="steps">
          <div class="step">
            <span class="step-chip">P</span>
            <div>
              <h3>データに基づく計画</h3>
              <p>前週の数値から改善仮説を立て、優先度を決定。感覚ではなく事実から始める。</p>
            </div>
          </div>
          <div class="step">
            <span class="step-chip">D</span>
            <div>
              <h3>小さく素早く実行</h3>
              <p>1週間で完了する粒度に分解してリリース。大きな失敗を構造的に防ぐ。</p>
            </div>
          </div>
          <div class="step">
            <span class="step-chip">C</span>
            <div>
              <h3>効果を定量検証</h3>
              <p>ダッシュボードでKPIへの影響を即日確認。効いた施策とそうでない施策を仕分け。</p>
            </div>
          </div>
          <div class="step">
            <span class="step-chip">A</span>
            <div>
              <h3>仕組みに反映</h3>
              <p>効果のあった施策を標準プロセスに組み込み、次の計画の土台にする。</p>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
