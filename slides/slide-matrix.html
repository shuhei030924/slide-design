<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ⑪ 2×2マトリクス型(オフホワイト×アンバー)
使うべきタイミング: 事業ポートフォリオ・優先順位・ポジショニングなど、2つの軸で選択肢を整理・分類したいとき。戦略議論向け。
向かないケース: 軸が1つの単純比較(→対比型へ)、項目の羅列(→3カード型へ)
-->
<head>
<meta charset="UTF-8">
<title>2x2マトリクス型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: #fbfaf9;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  :root {
    --main: #292524;
    --accent: #d97706;
    --text: #57534e;
  }
  .slide-inner {
    height: 100%; padding: 54px 72px 48px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.35em;
    color: var(--accent); text-transform: uppercase;
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo img, .logo svg { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }

  .slide-title { font-size: 38px; font-weight: 900; color: var(--main); margin-bottom: 24px; }

  /* マトリクス: 中央に軸ラベルを持つ2x2 */
  .matrix-wrap {
    flex: 1;
    position: relative;
    padding: 30px 60px 34px 82px;
  }
  .matrix {
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
  }
  .quad {
    border-radius: 16px;
    padding: 24px 28px;
    display: flex; flex-direction: column;
  }
  .quad-1 { background: #fef3c7; }   /* 左上 */
  .quad-2 { background: #ffedd5; border: 2.5px solid var(--accent); }  /* 右上: 注力領域 */
  .quad-3 { background: #f5f5f4; }   /* 左下 */
  .quad-4 { background: #fafaf9; border: 1px dashed #d6d3d1; }  /* 右下 */
  .quad-title { font-size: 20px; font-weight: 700; color: var(--main); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .quad-badge {
    font-size: 11px; font-weight: 700; color: #ffffff;
    background: var(--accent); border-radius: 999px; padding: 3px 12px;
  }
  .quad-desc { font-size: 14px; line-height: 1.75; color: var(--text); }
  /* 軸ラベル */
  .axis-y {
    position: absolute; left: 18px; top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    font-size: 14px; font-weight: 700; letter-spacing: 0.25em; color: #a8a29e;
  }
  .axis-y-arrow {
    position: absolute; left: 16px; top: calc(50% - 92px);
    font-size: 15px; font-weight: 700; color: #a8a29e;
  }
  .axis-x {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    font-size: 14px; font-weight: 700; letter-spacing: 0.25em; color: #a8a29e;
  }
  .axis-y-arrows, .axis-x-arrows { position: absolute; font-size: 12px; color: #d6d3d1; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Strategy Map</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="#d97706" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="#d97706"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">事業ポートフォリオの優先順位</h1>

      <div class="matrix-wrap">
        <span class="axis-y-arrow">↑</span>
        <span class="axis-y">市場成長性</span>
        <span class="axis-x">自社の強み →</span>
        <div class="matrix">
          <div class="quad quad-1">
            <div class="quad-title">新規開拓領域</div>
            <p class="quad-desc">成長市場だが自社実績は薄い。パートナー提携で参入の足がかりを作る。</p>
          </div>
          <div class="quad quad-2">
            <div class="quad-title">最注力領域<span class="quad-badge">FOCUS</span></div>
            <p class="quad-desc">成長市場×自社の強みが重なる本命。投資の60%を集中し、シェア確立を狙う。</p>
          </div>
          <div class="quad quad-3">
            <div class="quad-title">効率化領域</div>
            <p class="quad-desc">成熟市場かつ強みも限定的。自動化でコストを抑え、利益率を維持する。</p>
          </div>
          <div class="quad quad-4">
            <div class="quad-title">安定収益領域</div>
            <p class="quad-desc">成長は緩やかだが強みが活きる。既存顧客の満足度向上で LTV を最大化。</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
