<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉛ FAQ型(ライトブルー×ネイビー、Q&Aカード)
使うべきタイミング: よくある質問・想定問答をまとめたいとき。説明会の補足・営業資料の不安払拭パート。「FAQ」「よくある質問」系。
向かないケース: 1つのテーマの深い説明(→2カラム型へ)
-->
<head>
<meta charset="UTF-8">
<title>FAQ型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #f7fafd; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  :root { --main: #1e3a5f; --accent: #0369a1; --text: #475569; }
  .slide-inner { height: 100%; padding: 54px 76px; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo svg, .logo img { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }
  .slide-title { font-size: 38px; font-weight: 900; color: var(--main); margin-bottom: 26px; }
  .faqs { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .faq {
    background: #ffffff; border-radius: 16px;
    padding: 24px 28px;
    box-shadow: 0 2px 12px rgba(30, 58, 95, 0.06);
    display: flex; flex-direction: column;
  }
  .q { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
  .q-badge {
    flex-shrink: 0;
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--accent); color: #ffffff;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .q-text { font-size: 16.5px; font-weight: 700; color: var(--main); line-height: 1.5; padding-top: 3px; }
  .a { display: flex; gap: 12px; align-items: flex-start; }
  .a-badge {
    flex-shrink: 0;
    width: 30px; height: 30px; border-radius: 9px;
    background: #e0f2fe; color: var(--accent);
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .a-text { font-size: 14px; line-height: 1.8; color: var(--text); padding-top: 3px; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">FAQ</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#0369a1" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#0369a1"/></svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">よくいただくご質問</h1>

      <div class="faqs">
        <div class="faq">
          <div class="q"><span class="q-badge">Q</span><span class="q-text">導入までどのくらいかかりますか?</span></div>
          <div class="a"><span class="a-badge">A</span><span class="a-text">標準プランで最短2週間です。データ移行を含む場合も1〜2ヶ月で完了します。専任担当が全工程を伴走します。</span></div>
        </div>
        <div class="faq">
          <div class="q"><span class="q-badge">Q</span><span class="q-text">既存システムと連携できますか?</span></div>
          <div class="a"><span class="a-badge">A</span><span class="a-text">主要な会計・人事・CRMツール30種と標準連携済みです。その他もAPIで柔軟に接続できます。</span></div>
        </div>
        <div class="faq">
          <div class="q"><span class="q-badge">Q</span><span class="q-text">セキュリティ対策は?</span></div>
          <div class="a"><span class="a-badge">A</span><span class="a-text">ISO 27001認証取得済み。通信・保存データはすべて暗号化し、監査ログも標準提供しています。</span></div>
        </div>
        <div class="faq">
          <div class="q"><span class="q-badge">Q</span><span class="q-text">途中でプラン変更はできますか?</span></div>
          <div class="a"><span class="a-badge">A</span><span class="a-text">いつでも可能です。月単位でアップグレード・ダウングレードでき、日割り計算で精算します。</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
