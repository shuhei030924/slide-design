<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ② ビジネス型(白×ネイビー、2カラム)
使うべきタイミング: 提案書・社内資料などで要点を箇条書き+図解で堅実に伝えたいとき。最も汎用的。迷ったらこれ。
向かないケース: 感情に訴えるブランディング・toC向け訴求
-->
<head>
<meta charset="UTF-8">
<title>ビジネス系スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: #ffffff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  :root {
    --main: #1a2b4a;
    --accent: #2563eb;
    --text: #334155;
    --sub: #64748b;
  }
  /* 左端のアクセント帯 */
  .side-band {
    position: absolute; left: 0; top: 0;
    width: 14px; height: 100%;
    background: linear-gradient(180deg, var(--accent), #60a5fa);
  }
  .slide-inner {
    height: 100%;
    padding: 56px 64px 48px 78px;
    display: flex; flex-direction: column;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 40px;
  }
  .slide-title {
    font-size: 42px; font-weight: 900;
    color: var(--main); line-height: 1.3;
    padding-left: 20px;
    border-left: 8px solid var(--accent);
  }
  .slide-subtitle {
    font-size: 17px; color: var(--sub);
    margin-top: 8px; padding-left: 28px;
  }
  /* ★会社ロゴ */
  .logo { height: 40px; max-width: 220px; display: flex; align-items: center; }
  .logo img, .logo svg { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.1em; color: var(--main); }

  .slide-body { flex: 1; display: flex; gap: 56px; align-items: center; }
  .col { flex: 1; }
  .bullet-list { list-style: none; }
  .bullet-list li {
    font-size: 20px; color: var(--text); line-height: 1.6;
    padding: 18px 0 18px 44px;
    position: relative;
    border-bottom: 1px solid #e2e8f0;
  }
  .bullet-list li strong { color: var(--main); }
  .bullet-list li::before {
    content: "✓";
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #dbeafe; color: var(--accent);
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .slide-footer {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--sub);
    padding-top: 20px;
    border-top: 1px solid #e2e8f0;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="side-band"></div>
    <div class="slide-inner">
      <div class="topbar">
        <div>
          <h1 class="slide-title">業務効率を、仕組みで変える</h1>
          <p class="slide-subtitle">プロジェクト提案概要 — 2026年7月</p>
        </div>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 34px; margin-right: 10px;">
            <path d="M20 4 L36 32 H4 Z" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="#2563eb"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <div class="slide-body">
        <div class="col">
          <ul class="bullet-list">
            <li><strong>作業時間を40%削減</strong> — 定型業務の自動化で本来の業務に集中</li>
            <li><strong>属人化の解消</strong> — ナレッジを一元管理し、誰でも同品質で対応</li>
            <li><strong>3ヶ月で導入完了</strong> — 既存システムを活かす段階的な移行計画</li>
          </ul>
        </div>
        <div class="col">
          <!-- SVG図解: Before → After -->
          <svg viewBox="0 0 480 300" style="width: 100%;">
            <defs>
              <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
                <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
              </marker>
            </defs>
            <rect x="10" y="60" width="180" height="180" rx="14" fill="#f1f5f9"/>
            <text x="100" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b">Before</text>
            <rect x="40" y="125" width="120" height="22" rx="6" fill="#cbd5e1"/>
            <rect x="40" y="157" width="120" height="22" rx="6" fill="#cbd5e1"/>
            <rect x="40" y="189" width="120" height="22" rx="6" fill="#cbd5e1"/>
            <line x1="205" y1="150" x2="265" y2="150" stroke="#2563eb" stroke-width="3" marker-end="url(#ar)"/>
            <rect x="290" y="60" width="180" height="180" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
            <text x="380" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2563eb">After</text>
            <rect x="320" y="130" width="120" height="26" rx="8" fill="#2563eb"/>
            <text x="380" y="148" text-anchor="middle" font-size="13" fill="#ffffff">自動化フロー</text>
            <rect x="320" y="170" width="120" height="26" rx="8" fill="#60a5fa"/>
            <text x="380" y="188" text-anchor="middle" font-size="13" fill="#ffffff">一元管理</text>
          </svg>
        </div>
      </div>

      <div class="slide-footer">
        <span>Your Company Inc.</span>
        <span>CONFIDENTIAL</span>
      </div>
    </div>
  </div>
</body>
</html>
