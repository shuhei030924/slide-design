<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ⑤ カジュアル型(クリーム×オレンジ、ブロブ装飾)
使うべきタイミング: toCサービス・アプリの紹介、社内イベント告知など、親しみやすさ・楽しさを前面に出したいとき。
向かないケース: 役員向け報告・堅い商談などフォーマルな場
-->
<head>
<meta charset="UTF-8">
<title>カジュアル系スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: #fffbf5;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  :root {
    --main: #431407;
    --accent: #f97316;
    --coral: #fb7185;
    --text: #57534e;
  }
  /* 背景装飾: 有機的なブロブ */
  .blob { position: absolute; pointer-events: none; }
  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 60px 76px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #ffedd5; color: var(--accent);
    font-size: 14px; font-weight: 700;
    padding: 8px 20px; border-radius: 999px;
  }
  /* ★会社ロゴ */
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo img, .logo svg { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }

  .slide-body { flex: 1; display: flex; align-items: center; gap: 48px; }
  .content { flex: 1.1; }
  .slide-title {
    font-size: 46px; font-weight: 900;
    color: var(--main); line-height: 1.4;
    margin-bottom: 26px;
    white-space: nowrap;
  }
  .slide-title .marker {
    background: linear-gradient(transparent 62%, #fed7aa 62%);
    padding: 0 2px;
  }
  .slide-desc {
    font-size: 18px; line-height: 2.0;
    color: var(--text);
    margin-bottom: 34px;
    max-width: 520px;
  }
  .points { display: flex; gap: 16px; }
  .point {
    background: #ffffff;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(67, 20, 7, 0.07);
    display: flex; align-items: center; gap: 12px;
    font-size: 15px; font-weight: 700; color: var(--main);
    white-space: nowrap;
  }
  .point-emoji {
    width: 38px; height: 38px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
  }
  .visual { flex: 0.9; display: flex; justify-content: center; }
</style>
</head>
<body>
  <div class="slide">
    <!-- 背景ブロブ -->
    <svg class="blob" style="top: -120px; right: -100px; width: 480px;" viewBox="0 0 200 200">
      <path fill="#ffedd5" d="M44.7,-67.2C57.9,-59.3,68.5,-46.6,74.4,-31.9C80.3,-17.2,81.4,-0.6,77.6,14.5C73.8,29.6,65.1,43.2,53.4,53.4C41.7,63.7,27,70.6,10.9,74.3C-5.2,78,-22.7,78.4,-37.1,71.8C-51.5,65.2,-62.8,51.6,-70.1,36.2C-77.4,20.8,-80.7,3.6,-77.7,-12.2C-74.6,-27.9,-65.2,-42.2,-52.5,-50.4C-39.8,-58.5,-23.9,-60.5,-8.1,-59.9C7.7,-59.3,31.5,-75.1,44.7,-67.2Z" transform="translate(100 100)"/>
    </svg>
    <svg class="blob" style="bottom: -140px; left: -110px; width: 400px;" viewBox="0 0 200 200">
      <path fill="#ffe4e6" d="M39.9,-56.7C53.4,-49.3,66.9,-40.1,73.4,-27.2C79.9,-14.3,79.4,2.4,74.3,17.1C69.2,31.8,59.5,44.6,47.1,54.3C34.7,64,19.6,70.7,3.4,66.3C-12.8,61.9,-30.1,46.4,-42.4,32.1C-54.6,17.8,-61.8,4.6,-61.5,-8.9C-61.1,-22.4,-53.2,-36.2,-41.9,-43.9C-30.6,-51.6,-15.3,-53.2,-0.4,-52.7C14.5,-52.2,26.4,-64,39.9,-56.7Z" transform="translate(100 100)"/>
    </svg>

    <div class="slide-inner">
      <div class="topbar">
        <span class="badge">🎉 新サービスリリース</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="#f97316"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <div class="slide-body">
        <div class="content">
          <h1 class="slide-title">毎日がちょっと、<br><span class="marker">たのしくなる</span>アプリ。</h1>
          <p class="slide-desc">
            むずかしい設定はゼロ。開いたその日から、あなたの暮らしに寄り添います。まずは無料ではじめてみませんか?
          </p>
          <div class="points">
            <div class="point"><span class="point-emoji" style="background:#ffedd5;">⚡</span>登録1分</div>
            <div class="point"><span class="point-emoji" style="background:#ffe4e6;">💰</span>ずっと無料</div>
            <div class="point"><span class="point-emoji" style="background:#fef3c7;">📱</span>アプリ対応</div>
          </div>
        </div>

        <div class="visual">
          <!-- SVGイラスト: スマホとキラキラ -->
          <svg viewBox="0 0 320 400" style="width: 300px;">
            <defs>
              <linearGradient id="phone-g" x1="0" y1="0" x2="320" y2="400">
                <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb7185"/>
              </linearGradient>
            </defs>
            <rect x="80" y="40" width="180" height="330" rx="28" fill="#ffffff" stroke="#431407" stroke-width="3"/>
            <rect x="96" y="76" width="148" height="240" rx="14" fill="url(#phone-g)" opacity="0.14"/>
            <rect x="140" y="54" width="60" height="8" rx="4" fill="#431407"/>
            <circle cx="170" cy="170" r="42" fill="url(#phone-g)"/>
            <path d="M156 170 l10 10 l20 -22" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <rect x="120" y="240" width="100" height="12" rx="6" fill="#fed7aa"/>
            <rect x="132" y="264" width="76" height="12" rx="6" fill="#ffe4e6"/>
            <!-- キラキラ -->
            <path d="M52 110 l6 14 14 6 -14 6 -6 14 -6 -14 -14 -6 14 -6 Z" fill="#f97316"/>
            <path d="M272 300 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#fb7185"/>
            <circle cx="282" cy="90" r="7" fill="#fbbf24"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
