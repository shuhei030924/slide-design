<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉙ 引用・名言型(クリーム×ゴールド、セリフ大引用)
使うべきタイミング: 創業者の言葉・著名人の名言・キーメッセージを1つだけ、印象的に見せたいとき。講演・理念系資料のアクセント。
向かないケース: 複数の顧客の声(→お客様の声型へ)、データの提示
-->
<head>
<meta charset="UTF-8">
<title>引用型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500&family=Inter:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #d6d3cd; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #fdfcf8; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
  :root { --main: #292524; --gold: #b45309; }
  .quote-mark-bg {
    position: absolute; top: 30px; left: 60px;
    font-family: Georgia, serif; font-size: 320px; line-height: 1;
    color: rgba(180, 83, 9, 0.08);
    pointer-events: none;
  }
  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 70px 110px;
    display: flex; flex-direction: column;
  }
  .logo { height: 36px; display: flex; align-items: center; align-self: flex-end; }
  .logo svg, .logo img { height: 100%; max-width: 220px; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.12em; color: #78716c; }
  .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .quote {
    font-family: 'Noto Serif JP', serif;
    font-size: 46px; font-weight: 700;
    color: var(--main); line-height: 1.75;
    letter-spacing: 0.04em;
  }
  .quote em { font-style: normal; color: var(--gold); }
  .attribution {
    display: flex; align-items: center; gap: 18px;
    margin-top: 44px;
  }
  .attr-line { width: 56px; height: 2px; background: var(--gold); }
  .attr-name { font-size: 17px; font-weight: 700; color: var(--main); }
  .attr-role { font-size: 13.5px; color: #a8a29e; margin-top: 2px; }
</style>
</head>
<body>
  <div class="slide">
    <div class="quote-mark-bg">“</div>
    <div class="slide-inner">
      <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
      <div class="logo">
        <svg viewBox="0 0 40 40" fill="none" style="width: 30px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#b45309" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#b45309"/></svg>
        <span class="logo-text">YOUR LOGO</span>
      </div>

      <div class="hero">
        <p class="quote">
          完璧を目指すより、<br>
          まず<em>終わらせろ</em>。<br>
          改善は、そこから始まる。
        </p>
        <div class="attribution">
          <span class="attr-line"></span>
          <div>
            <div class="attr-name">山田 太郎</div>
            <div class="attr-role">創業者・代表取締役 — 創業時の社内メモより</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
