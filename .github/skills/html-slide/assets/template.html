<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スライドタイトル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ===== 基本設定(変更しない) ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb; /* スライド外の背景 */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px;
    height: 720px;
    overflow: hidden;        /* はみ出し禁止 */
    position: relative;
    background: #ffffff;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }

  /* ===== ここから下は内容に応じて自由に変更 ===== */
  :root {
    --color-main: #1a2b4a;    /* メインカラー */
    --color-accent: #2563eb;  /* アクセントカラー */
    --color-text: #334155;    /* 本文色 */
    --color-sub: #64748b;     /* 補足色 */
  }
  .slide-inner {
    height: 100%;
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
  }

  /* タイトル部(アクセントバー付き) */
  .slide-header { margin-bottom: 36px; }
  .slide-title {
    font-size: 44px;
    font-weight: 900;
    color: var(--color-main);
    line-height: 1.3;
    padding-left: 20px;
    border-left: 8px solid var(--color-accent);
  }
  .slide-subtitle {
    font-size: 18px;
    color: var(--color-sub);
    margin-top: 8px;
    padding-left: 28px;
  }

  /* 本文: 2カラム例 */
  .slide-body {
    flex: 1;
    display: flex;
    gap: 48px;
    align-items: center;
  }
  .col { flex: 1; }
  .bullet-list { list-style: none; }
  .bullet-list li {
    font-size: 20px;
    color: var(--color-text);
    line-height: 1.7;
    padding-left: 28px;
    position: relative;
    margin-bottom: 18px;
  }
  .bullet-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 12px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--color-accent);
  }

  /* フッター(出典・社名など。ページ番号は入れない) */
  .slide-footer {
    position: absolute;
    bottom: 20px;
    right: 32px;
    font-size: 13px;
    color: var(--color-sub);
  }

  /* 背景装飾(控えめな幾何学図形) */
  .deco {
    position: absolute;
    border-radius: 50%;
    background: var(--color-accent);
    opacity: 0.06;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="slide">
    <!-- 背景装飾 -->
    <div class="deco" style="width: 400px; height: 400px; top: -150px; right: -120px;"></div>
    <div class="deco" style="width: 240px; height: 240px; bottom: -100px; left: -80px;"></div>

    <div class="slide-inner">
      <header class="slide-header">
        <h1 class="slide-title">スライドタイトル</h1>
        <p class="slide-subtitle">サブタイトルや補足説明をここに</p>
      </header>

      <div class="slide-body">
        <div class="col">
          <ul class="bullet-list">
            <li>ポイント1: 簡潔に1行で書く</li>
            <li>ポイント2: 箇条書きは最大5項目まで</li>
            <li>ポイント3: 図解と組み合わせて伝える</li>
          </ul>
        </div>
        <div class="col">
          <!-- 図解エリア: インラインSVG or <img> を配置 -->
          <svg viewBox="0 0 400 280" style="width: 100%;">
            <rect x="40" y="40" width="140" height="60" rx="10" fill="none" stroke="#2563eb" stroke-width="2"/>
            <text x="110" y="76" text-anchor="middle" font-size="16" fill="#1a2b4a">要素A</text>
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
              </marker>
            </defs>
            <line x1="110" y1="100" x2="110" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
            <rect x="40" y="180" width="140" height="60" rx="10" fill="#2563eb"/>
            <text x="110" y="216" text-anchor="middle" font-size="16" fill="#ffffff">要素B</text>
          </svg>
        </div>
      </div>
    </div>

    <div class="slide-footer">Company Name</div>
  </div>
</body>
</html>
