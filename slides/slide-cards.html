<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ③ 3カード型(ライト×パープル)
使うべきタイミング: 特徴・強み・プランなど3〜4項目を同格に並べて訴求したいとき。「3つの理由」「選ばれるポイント」系の依頼。
向かないケース: 項目間に流れ・順序がある内容(→フロー型へ)
-->
<head>
<meta charset="UTF-8">
<title>3カード比較スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: #f8fafc;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  :root {
    --main: #0f172a;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --text: #475569;
  }
  /* 背景装飾 */
  .deco {
    position: absolute; border-radius: 50%;
    background: var(--accent); opacity: 0.05;
    pointer-events: none;
  }
  .slide-inner {
    position: relative;
    height: 100%; padding: 56px 72px 52px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.4em;
    color: var(--accent); text-transform: uppercase;
  }
  /* ★会社ロゴ */
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo img, .logo svg { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }

  .slide-title {
    font-size: 44px; font-weight: 900;
    color: var(--main); line-height: 1.3;
    margin-bottom: 10px;
  }
  .slide-lead { font-size: 17px; color: var(--text); margin-bottom: 40px; }

  .cards { flex: 1; display: flex; gap: 32px; }
  .card {
    flex: 1;
    background: #ffffff;
    border-radius: 20px;
    padding: 38px 32px;
    box-shadow: 0 2px 16px rgba(15, 23, 42, 0.06);
    border-top: 5px solid var(--accent2);
    display: flex; flex-direction: column;
  }
  .card.featured {
    border-top-color: var(--accent);
    box-shadow: 0 8px 32px rgba(124, 58, 237, 0.18);
  }
  .card-icon {
    width: 58px; height: 58px;
    border-radius: 16px;
    background: #f3efff;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
  }
  .card-num {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.25em;
    color: var(--accent); margin-bottom: 8px;
  }
  .card-title { font-size: 23px; font-weight: 700; color: var(--main); margin-bottom: 14px; }
  .card-desc { font-size: 15px; line-height: 1.9; color: var(--text); }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco" style="width: 460px; height: 460px; top: -200px; right: -160px;"></div>
    <div class="deco" style="width: 300px; height: 300px; bottom: -140px; left: -100px;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Our Strengths</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="#7c3aed"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">選ばれる、3つの理由</h1>
      <p class="slide-lead">技術力・スピード・伴走力。すべてを高い水準で提供します。</p>

      <div class="cards">
        <div class="card">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 30px;">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
          <div class="card-num">01</div>
          <h2 class="card-title">確かな技術力</h2>
          <p class="card-desc">最新技術に精通したエンジニアが、拡張性と保守性を両立した設計で開発します。</p>
        </div>

        <div class="card featured">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 30px;">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </div>
          <div class="card-num">02</div>
          <h2 class="card-title">圧倒的スピード</h2>
          <p class="card-desc">最短2週間でプロトタイプを提供。素早い検証サイクルで意思決定を加速します。</p>
        </div>

        <div class="card">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 30px;">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div class="card-num">03</div>
          <h2 class="card-title">継続的な伴走</h2>
          <p class="card-desc">リリース後も改善を継続。データに基づく提案で成果まで並走します。</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
