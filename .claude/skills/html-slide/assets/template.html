<!DOCTYPE html>
<html lang="ja">
<!--
ライトテーマ基本テンプレート(コーポレートブルー)
使い方: これをコピーし、:root のトークンを design-guide.md のテーマに差し替え、ボディだけ作り込む。
構造(トップバー→タイトル→ボディ→フッター)は崩さない。
-->
<head>
<meta charset="UTF-8">
<title>スライドタイトル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  /* ===== 基本設定(変更しない) ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb; /* スライド外の背景 */
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden;        /* はみ出し禁止 */
    position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }

  /* ===== カラートークン(design-guide.md のテーマを丸ごとコピーして差し替え可) ===== */
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-2: #eff6ff;
    --border: #e2e8f0;
    --ink: #0f172a;
    --text: #334155;
    --sub: #64748b;
    --accent: #2563eb;
    --accent-2: #0ea5e9;
    --grad: linear-gradient(120deg, #2563eb, #0ea5e9);
  }

  /* ===== 共通構造: トップバー / タイトル / ボディ / フッター ===== */
  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 60px 80px;
    display: flex; flex-direction: column;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  /* タイトルは結論を言い切るメッセージ文。強調は <em> 1箇所だけ */
  .slide-title {
    font-size: 40px; font-weight: 700;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 44px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .slide-body {
    flex: 1;
    display: flex; gap: 48px; align-items: center;
    min-height: 0; /* はみ出し防止 */
  }
  .col { flex: 1; }

  .bullet-list { list-style: none; }
  .bullet-list li {
    font-size: 18px; color: var(--text); line-height: 1.7;
    padding-left: 30px; position: relative; margin-bottom: 22px;
  }
  .bullet-list li strong { color: var(--ink); }
  .bullet-list li::before {
    content: ""; position: absolute; left: 0; top: 9px;
    width: 12px; height: 12px; border-radius: 4px;
    background: var(--grad);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
  }

  .footer {
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }

  /* 背景装飾(ライト用: 薄い円) */
  .deco {
    position: absolute; border-radius: 50%;
    background: var(--accent); opacity: 0.05;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="slide">
    <!-- 背景装飾 -->
    <div class="deco" style="width: 420px; height: 420px; top: -160px; right: -130px;"></div>
    <div class="deco" style="width: 260px; height: 260px; bottom: -110px; left: -90px;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Section Label</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ" style="height:100%; object-fit:contain;"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">結論を言い切るタイトルを、<em>ここ</em>に。</h1>

      <div class="slide-body">
        <div class="col">
          <ul class="bullet-list">
            <li><strong>ポイント1</strong> — 太字の結論+ダッシュ+短い補足の形が読みやすい</li>
            <li><strong>ポイント2</strong> — 箇条書きは最大5項目、1項目2行まで</li>
            <li><strong>ポイント3</strong> — 図解と組み合わせて伝える</li>
          </ul>
        </div>
        <div class="col">
          <!-- 図解エリア: インラインSVG or <img> を配置(svg-guide.md 参照) -->
          <svg viewBox="0 0 400 280" style="width: 100%;">
            <rect x="40" y="40" width="140" height="60" rx="10" fill="none" stroke="#2563eb" stroke-width="2"/>
            <!-- 中央: x = 40+70 = 110, y = 40+30 + 16*0.35 ≈ 76 -->
            <text x="110" y="76" text-anchor="middle" font-size="16" fill="#0f172a">要素A</text>
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
              </marker>
            </defs>
            <line x1="110" y1="100" x2="110" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
            <rect x="40" y="180" width="140" height="60" rx="10" fill="#2563eb"/>
            <text x="110" y="216" text-anchor="middle" font-size="16" fill="#ffffff">要素B</text>
          </svg>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
