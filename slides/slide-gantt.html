<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉗ ガントチャート型(白×インディゴ、スケジュール表)
使うべきタイミング: プロジェクトの詳細スケジュール・タスクの期間と担当を示したいとき。「スケジュール」「工程表」「ガント」系の依頼。
向かないケース: マイルストーン中心の大まかな計画(→ロードマップ型へ)
-->
<head>
<meta charset="UTF-8">
<title>ガントチャート型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #ffffff; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  :root { --main: #312e81; --accent: #6366f1; --text: #475569; }
  .slide-inner { height: 100%; padding: 54px 72px; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo svg, .logo img { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }
  .slide-title { font-size: 38px; font-weight: 900; color: var(--main); margin-bottom: 24px; }
  .slide-title em { font-style: normal; color: var(--accent); }

  /* ガント: 12列グリッド(6ヶ月×2) */
  .gantt { display: flex; flex-direction: column; }
  .g-header { display: flex; margin-bottom: 10px; }
  .g-task-col { flex: 0 0 240px; }
  .g-months { flex: 1; display: flex; }
  .g-month {
    flex: 1; text-align: center;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; color: #94a3b8;
    border-left: 1px dashed #e2e8f0; padding-bottom: 4px;
  }
  .g-row { display: flex; align-items: center; height: 62px; border-top: 1px solid #f1f5f9; }
  .g-task { flex: 0 0 240px; }
  .g-task-name { font-size: 16px; font-weight: 700; color: #1e293b; }
  .g-task-owner { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .g-bars { flex: 1; display: flex; position: relative; height: 100%; }
  .g-cell { flex: 1; border-left: 1px dashed #f1f5f9; }
  .g-bar {
    position: absolute; top: 50%; transform: translateY(-50%);
    height: 26px; border-radius: 8px;
    display: flex; align-items: center; padding-left: 12px;
    font-size: 11.5px; font-weight: 700; color: #ffffff;
    white-space: nowrap;
  }

  .milestone {
    flex: 1; margin-top: 26px; display: flex; align-items: center; gap: 16px;
    background: #eef2ff; border: 1px solid #e0e7ff; border-radius: 14px; padding: 20px 26px;
  }
  .milestone-icon {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(120deg, #6366f1, #a5b4fc);
    display: flex; align-items: center; justify-content: center;
  }
  .milestone p { font-size: 14.5px; color: var(--main); line-height: 1.7; }
  .milestone strong { font-weight: 700; }

  .footer {
    font-size: 12px; color: #94a3b8; letter-spacing: 0.15em;
    padding-top: 18px; margin-top: 20px; border-top: 1px solid #f1f5f9;
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Schedule</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#6366f1"/></svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">導入までの半年間を、<em>5工程</em>で完了させる。</h1>

      <div class="gantt">
        <div class="g-header">
          <div class="g-task-col"></div>
          <div class="g-months">
            <div class="g-month">7月</div><div class="g-month">8月</div><div class="g-month">9月</div>
            <div class="g-month">10月</div><div class="g-month">11月</div><div class="g-month">12月</div>
          </div>
        </div>

        <!-- バーの位置: left/width は 月数/6 の % で計算 -->
        <div class="g-row">
          <div class="g-task"><div class="g-task-name">要件定義</div><div class="g-task-owner">担当: 双方PM</div></div>
          <div class="g-bars">
            <div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div>
            <div class="g-bar" style="left: 0%; width: 25%; background: #6366f1;">1.5ヶ月</div>
          </div>
        </div>
        <div class="g-row">
          <div class="g-task"><div class="g-task-name">環境構築・データ移行</div><div class="g-task-owner">担当: 当社</div></div>
          <div class="g-bars">
            <div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div>
            <div class="g-bar" style="left: 20%; width: 30%; background: #818cf8;">約2ヶ月</div>
          </div>
        </div>
        <div class="g-row">
          <div class="g-task"><div class="g-task-name">設定・カスタマイズ</div><div class="g-task-owner">担当: 当社</div></div>
          <div class="g-bars">
            <div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div>
            <div class="g-bar" style="left: 41%; width: 25%; background: #818cf8;">1.5ヶ月</div>
          </div>
        </div>
        <div class="g-row">
          <div class="g-task"><div class="g-task-name">ユーザートレーニング</div><div class="g-task-owner">担当: CS</div></div>
          <div class="g-bars">
            <div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div>
            <div class="g-bar" style="left: 62%; width: 21%; background: #a5b4fc; color: #312e81;">1ヶ月+定着</div>
          </div>
        </div>
        <div class="g-row">
          <div class="g-task"><div class="g-task-name">本番稼働・伴走支援</div><div class="g-task-owner">担当: 双方</div></div>
          <div class="g-bars">
            <div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div><div class="g-cell"></div>
            <div class="g-bar" style="left: 83%; width: 17%; background: #312e81;">GO LIVE</div>
          </div>
        </div>
      </div>

      <div class="milestone">
        <span class="milestone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px;"><path d="M4 12 l5 5 L20 7"/></svg>
        </span>
        <p><strong>並行運用期間は設けず、11月の切替と同時に旧システムを停止。</strong>各工程の遅延許容は最大2週間、超過時は翌工程を圧縮せず全体を後ろ倒しする。</p>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
