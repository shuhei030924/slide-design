<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ⑥ プロセスフロー型(白×ティール)
使うべきタイミング: 導入手順・業務フローなど、時系列のステップ(3〜5段階)を順番に説明したいとき。「流れ」「ステップ」「手順」系の依頼。
向かないケース: 順序性のない並列の特徴紹介(→3カード型へ)、四半期単位の計画(→ロードマップ型へ)
-->
<head>
<meta charset="UTF-8">
<title>プロセスフロー型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: #ffffff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  :root {
    --main: #134e4a;
    --accent: #0d9488;
    --light: #ccfbf1;
    --text: #475569;
  }
  .top-band {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 8px;
    background: linear-gradient(90deg, #0d9488, #2dd4bf);
  }
  .slide-inner {
    height: 100%; padding: 62px 72px 56px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.35em;
    color: var(--accent); text-transform: uppercase;
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo img, .logo svg { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }

  .slide-title { font-size: 42px; font-weight: 900; color: var(--main); margin-bottom: 8px; }
  .slide-lead { font-size: 17px; color: var(--text); margin-bottom: 44px; }

  .flow { flex: 1; display: flex; align-items: flex-start; gap: 0; padding-top: 56px; }
  .step { flex: 1; text-align: center; position: relative; padding: 0 14px; }
  .step-circle {
    width: 110px; height: 110px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: var(--light);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .step.active .step-circle { background: var(--accent); }
  .step-num {
    position: absolute; top: -6px; right: -6px;
    width: 34px; height: 34px; border-radius: 50%;
    background: #ffffff; border: 2.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .step-title { font-size: 21px; font-weight: 700; color: var(--main); margin-bottom: 10px; }
  .step-desc { font-size: 14px; line-height: 1.8; color: var(--text); }
  /* 矢印コネクタ */
  .connector {
    align-self: flex-start;
    margin-top: 47px; /* circle中心(55px) - 矢印半分(8px)。.flowのpadding-topは全子要素共通 */
    flex: 0 0 36px;
    display: flex; justify-content: center;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="top-band"></div>
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Process</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="#0d9488" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="#0d9488"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">導入までの流れ</h1>
      <p class="slide-lead">お問い合わせから運用開始まで、最短4週間で伴走します。</p>

      <div class="flow">
        <div class="step">
          <div class="step-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 44px;">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="step-num">1</span>
          </div>
          <h2 class="step-title">ヒアリング</h2>
          <p class="step-desc">現状の課題と目標を整理し、最適なプランをご提案します。</p>
        </div>

        <div class="connector">
          <svg viewBox="0 0 24 16" style="width: 26px;"><path d="M2 8 h16 M13 2 l6 6 -6 6" stroke="#99f6e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <div class="step">
          <div class="step-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 44px;">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>
            </svg>
            <span class="step-num">2</span>
          </div>
          <h2 class="step-title">設計・お見積り</h2>
          <p class="step-desc">要件を具体化し、スケジュールと費用を明確にご提示します。</p>
        </div>

        <div class="connector">
          <svg viewBox="0 0 24 16" style="width: 26px;"><path d="M2 8 h16 M13 2 l6 6 -6 6" stroke="#99f6e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <div class="step">
          <div class="step-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 44px;">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
            <span class="step-num">3</span>
          </div>
          <h2 class="step-title">構築・テスト</h2>
          <p class="step-desc">週次で進捗を共有しながら、品質を確認して構築を進めます。</p>
        </div>

        <div class="connector">
          <svg viewBox="0 0 24 16" style="width: 26px;"><path d="M2 8 h16 M13 2 l6 6 -6 6" stroke="#99f6e4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <div class="step active">
          <div class="step-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 44px;">
              <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
            </svg>
            <span class="step-num">4</span>
          </div>
          <h2 class="step-title">運用開始</h2>
          <p class="step-desc">リリース後も定例レビューで改善を続け、成果を最大化します。</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
