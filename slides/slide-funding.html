<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 62 資金調達ラウンド型(コーポレートブルー、累計調達額の推移+ラウンド詳細)
使うべきタイミング: 「資金調達」「調達実績」「シリーズA/B/C」。スタートアップのIR・採用資料で調達ラウンドの推移と投資家を時系列で見せたいとき。
向かないケース: 製品ロードマップ(→ロードマップ型)、投資対効果の説明(→ROI型)
図の約束: 折れ線は累計調達額の推移。点の上の数値は各ラウンドでの調達額(単発)
-->
<head>
<meta charset="UTF-8">
<title>資金調達ラウンド型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-2: #eff6ff;
    --border: #e2e8f0;
    --ink: #0f172a;
    --text: #334155;
    --sub: #64748b;
    --accent: #2563eb;
    --accent-2: #0ea5e9;
    --grad: linear-gradient(120deg, #2563eb, #0ea5e9);
  }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 56px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 36px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 8px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .chart-wrap { flex: 1; min-height: 0; display: flex; align-items: center; }
  .chart-wrap svg { width: 100%; height: 100%; }

  .rounds-row { display: flex; margin-bottom: 24px; }
  .round-col { flex: 1; padding: 0 18px; }
  .round-col .r-name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .round-col .r-year { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--sub); margin: 3px 0 8px; }
  .round-col .r-investor { font-size: 12.5px; color: var(--text); line-height: 1.6; padding-top: 8px; border-top: 1px solid var(--border); }

  .footer {
    flex-shrink: 0;
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Funding History</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">累計調達額は<em>18.0億円</em>、次のステージへ。</h1>

      <div class="chart-wrap">
        <!-- 折れ線: viewBox 1120x260。列中心x=140,420,700,980(280刻み)。baseY=220,plotH=160,maxV=2000(単位:百万円) -->
        <svg viewBox="0 0 1120 260" preserveAspectRatio="none">
          <line x1="0" y1="220" x2="1120" y2="220" stroke="var(--border)" stroke-width="1.5"/>
          <polyline points="140,216 420,192 700,148 980,76"
                    fill="none" stroke="var(--accent)" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="140" cy="216" r="7" fill="var(--accent)"/>
          <circle cx="420" cy="192" r="7" fill="var(--accent)"/>
          <circle cx="700" cy="148" r="7" fill="var(--accent)"/>
          <circle cx="980" cy="76"  r="7" fill="var(--accent-2)"/>
          <!-- ラベル: 各点の上 y=point.y-18 -->
          <text x="140" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="var(--ink)">¥50M</text>
          <text x="420" y="174" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="var(--ink)">+¥300M</text>
          <text x="700" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="var(--ink)">+¥550M</text>
          <text x="980" y="58"  text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="var(--accent-2)">+¥900M</text>
        </svg>
      </div>

      <div class="rounds-row">
        <div class="round-col">
          <div class="r-name">Seed</div>
          <div class="r-year">2019年</div>
          <div class="r-investor">エンジェル投資家中心に調達</div>
        </div>
        <div class="round-col">
          <div class="r-name">Series A</div>
          <div class="r-year">2021年</div>
          <div class="r-investor">リード投資家: Meridian Ventures</div>
        </div>
        <div class="round-col">
          <div class="r-name">Series B</div>
          <div class="r-year">2023年</div>
          <div class="r-investor">リード投資家: Northline Capital</div>
        </div>
        <div class="round-col">
          <div class="r-name">Series C</div>
          <div class="r-year">2025年</div>
          <div class="r-investor">リード投資家: Vertex Growth Partners</div>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
