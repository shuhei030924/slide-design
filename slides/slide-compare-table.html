<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉒ 競合比較表型(白×ネイビー、機能比較テーブル)
使うべきタイミング: 自社と競合の機能・条件を表で比較したいとき。「競合比較」「他社との違い」「機能比較表」系の依頼。自社列を強調。
向かないケース: 2者の物語的な対比(→対比型へ)、価格中心(→料金プラン型へ)
-->
<head>
<meta charset="UTF-8">
<title>競合比較表型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #ffffff; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  :root { --main: #1e3a8a; --accent: #2563eb; --text: #475569; }
  .slide-inner { height: 100%; padding: 54px 80px; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo svg, .logo img { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }
  .slide-title { font-size: 38px; font-weight: 900; color: var(--main); margin-bottom: 26px; }

  table { width: 100%; border-collapse: separate; border-spacing: 0; flex: 1; }
  th, td { text-align: center; padding: 17px 14px; font-size: 15.5px; }
  thead th { font-size: 16px; font-weight: 700; color: var(--text); border-bottom: 2px solid #e2e8f0; }
  thead th.ours {
    background: var(--accent); color: #ffffff;
    border-radius: 14px 14px 0 0; font-size: 17px;
  }
  tbody td:first-child, thead th:first-child { text-align: left; font-weight: 700; color: #0f172a; }
  tbody td { border-bottom: 1px solid #f1f5f9; color: var(--text); }
  tbody td.ours { background: #eff6ff; font-weight: 700; color: var(--main); }
  tbody tr:last-child td.ours { border-radius: 0 0 14px 14px; }
  .ok { color: #16a34a; font-weight: 800; font-size: 18px; }
  .ng { color: #cbd5e1; font-weight: 700; font-size: 18px; }
  .note { font-size: 12px; color: #94a3b8; margin-top: 14px; text-align: right; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Comparison</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#2563eb"/></svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">主要サービスとの機能比較</h1>

      <table>
        <thead>
          <tr>
            <th></th>
            <th class="ours">当社サービス</th>
            <th>A社</th>
            <th>B社</th>
            <th>C社</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>導入期間</td>
            <td class="ours">最短2週間</td>
            <td>2〜3ヶ月</td>
            <td>1ヶ月</td>
            <td>3ヶ月〜</td>
          </tr>
          <tr>
            <td>ノーコード設定</td>
            <td class="ours"><span class="ok">✓</span></td>
            <td><span class="ng">—</span></td>
            <td><span class="ok">✓</span></td>
            <td><span class="ng">—</span></td>
          </tr>
          <tr>
            <td>API連携</td>
            <td class="ours"><span class="ok">✓</span></td>
            <td><span class="ok">✓</span></td>
            <td><span class="ng">—</span></td>
            <td><span class="ok">✓</span></td>
          </tr>
          <tr>
            <td>日本語サポート</td>
            <td class="ours">専任担当制</td>
            <td>メールのみ</td>
            <td>チャットのみ</td>
            <td>メールのみ</td>
          </tr>
          <tr>
            <td>初期費用</td>
            <td class="ours">0円</td>
            <td>50万円〜</td>
            <td>30万円〜</td>
            <td>100万円〜</td>
          </tr>
        </tbody>
      </table>
      <p class="note">※ 2026年6月時点、各社公開情報より当社調べ</p>
    </div>
  </div>
</body>
</html>
