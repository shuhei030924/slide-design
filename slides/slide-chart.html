<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ⑩ グラフ・チャート型(白×ブルー、SVG棒グラフ)
使うべきタイミング: 売上推移・成長率など時系列データや実績の推移を根拠として見せたいとき。グラフ+考察ノートの構成。
向かないケース: 単発の数値強調(→KPI型へ)、比率の内訳(円グラフより横帯グラフ推奨)
-->
<head>
<meta charset="UTF-8">
<title>グラフ・チャート型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: #ffffff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  :root {
    --main: #172554;
    --accent: #3b82f6;
    --text: #475569;
  }
  .slide-inner {
    height: 100%; padding: 56px 72px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.35em;
    color: var(--accent); text-transform: uppercase;
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo img, .logo svg { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }

  .slide-title { font-size: 40px; font-weight: 900; color: var(--main); margin-bottom: 28px; }
  .slide-title em { font-style: normal; color: var(--accent); }

  .slide-body { flex: 1; display: flex; gap: 52px; align-items: center; }
  .chart-area { flex: 1.4; }
  .notes { flex: 1; }
  .note {
    padding: 22px 26px;
    border-radius: 14px;
    margin-bottom: 18px;
    background: #f8fafc;
    border-left: 5px solid var(--accent);
  }
  .note-title { font-size: 18px; font-weight: 700; color: var(--main); margin-bottom: 6px; }
  .note-desc { font-size: 14.5px; line-height: 1.8; color: var(--text); }
  .note.highlight { background: #eff6ff; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Sales Growth</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="#3b82f6"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">売上高は6年連続成長、<em>128億円</em>へ。</h1>

      <div class="slide-body">
        <div class="chart-area">
          <!--
            棒グラフの座標計算 (viewBox 0 0 560 370):
            baseY=310, plotH=250, maxV=130
            barH = v / maxV * plotH,  y = baseY - barH
            barW=52, 間隔84px, x_i = 40 + i*84
          -->
          <svg viewBox="0 0 560 370" style="width: 100%;">
            <defs>
              <linearGradient id="bar-g" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#93c5fd"/>
              </linearGradient>
            </defs>
            <!-- 目盛線 -->
            <line x1="30" y1="310" x2="540" y2="310" stroke="#cbd5e1" stroke-width="1.5"/>
            <line x1="30" y1="214" x2="540" y2="214" stroke="#f1f5f9" stroke-width="1"/>
            <line x1="30" y1="118" x2="540" y2="118" stroke="#f1f5f9" stroke-width="1"/>
            <!-- 棒 (2021-2025は淡色、2026は強調) -->
            <rect x="40"  y="233" width="52" height="77"  rx="6" fill="#dbeafe"/>
            <rect x="124" y="210" width="52" height="100" rx="6" fill="#dbeafe"/>
            <rect x="208" y="193" width="52" height="117" rx="6" fill="#bfdbfe"/>
            <rect x="292" y="166" width="52" height="144" rx="6" fill="#bfdbfe"/>
            <rect x="376" y="137" width="52" height="173" rx="6" fill="#93c5fd"/>
            <rect x="460" y="64"  width="52" height="246" rx="6" fill="url(#bar-g)"/>
            <!-- 値ラベル(棒の上 y-12) -->
            <text x="66"  y="221" text-anchor="middle" font-size="15" fill="#94a3b8">40</text>
            <text x="150" y="198" text-anchor="middle" font-size="15" fill="#94a3b8">52</text>
            <text x="234" y="181" text-anchor="middle" font-size="15" fill="#94a3b8">61</text>
            <text x="318" y="154" text-anchor="middle" font-size="15" fill="#94a3b8">75</text>
            <text x="402" y="125" text-anchor="middle" font-size="15" fill="#64748b">90</text>
            <text x="486" y="50"  text-anchor="middle" font-size="20" font-weight="700" fill="#172554">128</text>
            <!-- 年ラベル(baseY+26) -->
            <text x="66"  y="336" text-anchor="middle" font-size="14" fill="#94a3b8">2021</text>
            <text x="150" y="336" text-anchor="middle" font-size="14" fill="#94a3b8">2022</text>
            <text x="234" y="336" text-anchor="middle" font-size="14" fill="#94a3b8">2023</text>
            <text x="318" y="336" text-anchor="middle" font-size="14" fill="#94a3b8">2024</text>
            <text x="402" y="336" text-anchor="middle" font-size="14" fill="#94a3b8">2025</text>
            <text x="486" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#172554">2026</text>
            <text x="30" y="362" font-size="12" fill="#94a3b8">単位: 億円</text>
          </svg>
        </div>

        <div class="notes">
          <div class="note highlight">
            <div class="note-title">前年比 +42% の急成長</div>
            <p class="note-desc">新プロダクトの寄与により、成長率が過去最高を記録。</p>
          </div>
          <div class="note">
            <div class="note-title">継続収益比率 85%</div>
            <p class="note-desc">サブスクリプション型への転換が完了し、収益が安定化。</p>
          </div>
          <div class="note">
            <div class="note-title">来期目標 180億円</div>
            <p class="note-desc">海外展開とパートナー戦略でさらなる成長を計画。</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
