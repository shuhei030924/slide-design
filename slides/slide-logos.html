<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉜ 導入実績ロゴウォール型(白×グレー、ロゴ8枠)
使うべきタイミング: 導入企業・取引先・受賞歴を並べて信頼性を示したいとき。「導入実績」「取引先一覧」系の依頼。ロゴ画像に差し替えて使う。
向かないケース: 個別の事例を深く語る(→お客様の声型へ)
-->
<head>
<meta charset="UTF-8">
<title>導入実績型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #ffffff; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  :root { --main: #111827; --accent: #4b5563; --text: #6b7280; }
  .slide-inner { height: 100%; padding: 48px 80px; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo svg, .logo img { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }
  .slide-title { font-size: 38px; font-weight: 900; color: var(--main); }
  .slide-title em { font-style: normal; color: #2563eb; }
  .slide-lead { font-size: 15px; color: var(--text); margin: 8px 0 22px; }
  .wall { flex: 1; min-height: 0; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr 1fr; gap: 16px; }
  /* ★各枠の中身を <img src="../images/client-logo.png"> に差し替える(grayscaleで統一感) */
  .client {
    border: 1px solid #e5e7eb; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    background: #fafafa;
  }
  .client img { max-width: 70%; max-height: 56%; object-fit: contain; filter: grayscale(1); opacity: 0.75; }
  .ph { font-family: 'Inter', sans-serif; font-size: 19px; font-weight: 800; letter-spacing: 0.06em; color: #9ca3af; }
  .stats { flex-shrink: 0; display: flex; gap: 0; margin-top: 22px; border-top: 1px solid #e5e7eb; padding-top: 18px; }
  .stat { flex: 1; text-align: center; }
  .stat + .stat { border-left: 1px solid #e5e7eb; }
  .stat-val { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 800; color: var(--main); white-space: nowrap; }
  .stat-val small { font-size: 14px; color: var(--text); }
  .stat-label { font-size: 12.5px; color: var(--text); margin-top: 2px; }
  .footer {
    flex-shrink: 0; font-size: 12px; color: var(--text); letter-spacing: 0.15em;
    padding-top: 16px; margin-top: 18px; border-top: 1px solid #e5e7eb;
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Trusted By</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#4b5563" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#4b5563"/></svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">業界を代表する<em>2,400社</em>が導入</h1>
      <p class="slide-lead">製造・小売・金融・自治体まで。規模や業種を問わず選ばれています。</p>

      <div class="wall">
        <div class="client"><span class="ph">ACME Inc.</span></div>
        <div class="client"><span class="ph">GLOBEX</span></div>
        <div class="client"><span class="ph">初雁工業</span></div>
        <div class="client"><span class="ph">UMBRELLA</span></div>
        <div class="client"><span class="ph">若葉銀行</span></div>
        <div class="client"><span class="ph">STARK</span></div>
        <div class="client"><span class="ph">大空物流</span></div>
        <div class="client"><span class="ph">WAYNE</span></div>
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-val">2,400<small> 社</small></div><div class="stat-label">導入企業数</div></div>
        <div class="stat"><div class="stat-val">99.2<small> %</small></div><div class="stat-label">継続率</div></div>
        <div class="stat"><div class="stat-val">32<small> 業種</small></div><div class="stat-label">対応業界</div></div>
        <div class="stat"><div class="stat-val">No.1<small></small></div><div class="stat-label">顧客満足度*</div></div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
