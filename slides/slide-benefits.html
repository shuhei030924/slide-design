<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 60 福利厚生・オフィス紹介型(ウォームカジュアル、制度アイコン6枠)
使うべきタイミング: 「福利厚生」「働きやすさ」「社内制度紹介」。採用資料・会社紹介で制度や文化をアイコン付きで一覧させたいとき。
向かないケース: 募集職種の一覧(→求人ポジション一覧型)、組織や文化を数字で見せる(→数字で見る型)
-->
<head>
<meta charset="UTF-8">
<title>福利厚生・オフィス紹介型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }
  :root {
    --bg: #fffaf3;
    --surface: #ffffff;
    --surface-2: #ffedd5;
    --border: #f3e3cf;
    --ink: #431f0e;
    --text: #6b4a35;
    --sub: #a1836f;
    --accent: #f97316;
    --accent-2: #fbbf24;
    --grad: linear-gradient(120deg, #f97316, #fbbf24);
  }
  .deco { position: absolute; border-radius: 50%; background: #fde8c8; pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 56px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 36px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 26px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .grid { flex: 1; min-height: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .perk {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 26px;
    box-shadow: 0 1px 3px rgba(67, 31, 14, 0.05);
    display: flex; flex-direction: column; justify-content: center;
  }
  .perk-icon {
    width: 40px; height: 40px; border-radius: 11px; margin-bottom: 10px;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
  }
  .perk h3 { font-size: 15.5px; font-weight: 700; color: var(--ink); }
  .perk p { font-size: 12.5px; color: var(--sub); margin-top: 5px; line-height: 1.6; }

  .footer {
    flex-shrink: 0;
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco" style="width: 380px; height: 380px; top: -160px; right: -120px;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Benefits &amp; Culture</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">働きやすさは、<em>制度の数</em>で証明する。</h1>

      <div class="grid">
        <div class="perk">
          <span class="perk-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg></span>
          <h3>フルリモートOK</h3>
          <p>週1出社のみ。全国どこからでも勤務できる</p>
        </div>
        <div class="perk">
          <span class="perk-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></span>
          <h3>フレックスタイム</h3>
          <p>コアタイムなし。生活に合わせて柔軟に働ける</p>
        </div>
        <div class="perk">
          <span class="perk-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
          <h3>書籍・学習支援</h3>
          <p>書籍・研修・資格・カンファレンス費用を月2万円まで負担</p>
        </div>
        <div class="perk">
          <span class="perk-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
          <h3>特別休暇</h3>
          <p>リフレッシュ休暇 年5日+誕生日休暇を別途付与</p>
        </div>
        <div class="perk">
          <span class="perk-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span>
          <h3>健康診断+人間ドック</h3>
          <p>家族分も会社負担。年1回の人間ドックを推奨</p>
        </div>
        <div class="perk">
          <span class="perk-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><circle cx="9" cy="8" r="3"/><path d="M2 20v-1a6 5 0 0 1 12 0v1"/><circle cx="18" cy="9" r="2.5"/><path d="M15 20v-1a4.5 4 0 0 1 8 0v1"/></svg></span>
          <h3>社内サークル活動支援</h3>
          <p>部活動費を月1万円まで補助。運動系・文化系ともに対応</p>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
