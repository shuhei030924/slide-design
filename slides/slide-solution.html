<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ⑳ ソリューション全体像型(ライト×バイオレット、中心円+周辺)
使うべきタイミング: サービスの全体像・提供価値マップなど、中心となる価値と周辺要素の関係を一望させたいとき。非技術者向けの概念図。
向かないケース: 技術的な構成(→⑮システム構成図型)、階層関係(→⑭組織図型)
-->
<head>
<meta charset="UTF-8">
<title>ソリューション全体像型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }
  :root {
    --bg: #f8f7fd;
    --surface: #ffffff;
    --surface-2: #f1edfd;
    --border: #e5e0f5;
    --ink: #231a4f;
    --text: #46406b;
    --sub: #7d76a3;
    --accent: #7c3aed;
    --accent-2: #a78bfa;
    --grad: linear-gradient(120deg, #7c3aed, #a78bfa);
  }
  .deco { position: absolute; border-radius: 50%; background: var(--accent); opacity: 0.05; pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 56px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 38px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 24px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  /* 相関図: 中央ハブ+四隅カード。接続線はSVGを下に敷く */
  .diagram { flex: 1; position: relative; min-height: 0; margin-bottom: 24px; }
  .lines { position: absolute; inset: 0; width: 100%; height: 100%; }

  .hub {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 230px; height: 230px; border-radius: 50%;
    background: var(--grad);
    box-shadow: 0 0 0 22px rgba(124, 58, 237, 0.06), 0 8px 28px rgba(124, 58, 237, 0.28);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    text-align: center;
  }
  .hub .name { font-family: 'Inter', sans-serif; font-size: 21px; font-weight: 800; color: #ffffff; letter-spacing: 0.03em; line-height: 1.3; }
  .hub .cap { font-size: 12.5px; color: rgba(255,255,255,0.85); }

  .sat {
    position: absolute;
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 22px;
    box-shadow: 0 1px 3px rgba(35, 26, 79, 0.06);
    display: flex; gap: 14px; align-items: flex-start;
  }
  .sat.tl { left: 0; top: 0; }
  .sat.tr { right: 0; top: 0; }
  .sat.bl { left: 0; bottom: 0; }
  .sat.br { right: 0; bottom: 0; }
  .icon-chip {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sat h3 { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
  .sat p { font-size: 12.5px; color: var(--sub); line-height: 1.6; }

  .footer {
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco" style="width: 420px; height: 420px; top: -170px; right: -130px;"></div>
    <div class="deco" style="width: 260px; height: 260px; bottom: -110px; left: -90px;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Solution Map</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">1つのプラットフォームで、<em>業務のすべて</em>を。</h1>

      <div class="diagram">
        <!-- 接続線: viewBoxはコンテナ比率に合わせて伸縮(線のみなので歪み無視でよい) -->
        <svg class="lines" viewBox="0 0 1120 400" preserveAspectRatio="none">
          <line x1="560" y1="200" x2="160" y2="70"  stroke="#d6ccf2" stroke-width="2.5"/>
          <line x1="560" y1="200" x2="960" y2="70"  stroke="#d6ccf2" stroke-width="2.5"/>
          <line x1="560" y1="200" x2="160" y2="330" stroke="#d6ccf2" stroke-width="2.5"/>
          <line x1="560" y1="200" x2="960" y2="330" stroke="#d6ccf2" stroke-width="2.5"/>
          <circle cx="160" cy="70"  r="6" fill="#a78bfa"/>
          <circle cx="960" cy="70"  r="6" fill="#a78bfa"/>
          <circle cx="160" cy="330" r="6" fill="#a78bfa"/>
          <circle cx="960" cy="330" r="6" fill="#a78bfa"/>
        </svg>

        <div class="hub">
          <span class="name">YOUR<br>PLATFORM</span>
          <span class="cap">業務データの中核</span>
        </div>

        <div class="sat tl">
          <div class="icon-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px;">
              <ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5 v14 c0 1.7 3.6 3 8 3 s8 -1.3 8 -3 V5"/><path d="M4 12 c0 1.7 3.6 3 8 3 s8 -1.3 8 -3"/>
            </svg>
          </div>
          <div>
            <h3>データ統合</h3>
            <p>散在する全システムのデータを自動連携で1か所に集約。</p>
          </div>
        </div>

        <div class="sat tr">
          <div class="icon-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px;">
              <path d="M13 2 L3 14 h7 l-1 8 L19 10 h-7 z"/>
            </svg>
          </div>
          <div>
            <h3>業務自動化</h3>
            <p>転記・集計・通知などの定型作業をノーコードでゼロに。</p>
          </div>
        </div>

        <div class="sat bl">
          <div class="icon-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px;">
              <path d="M3 12 h4 l2 -6 4 12 2 -6 h6"/>
            </svg>
          </div>
          <div>
            <h3>リアルタイム可視化</h3>
            <p>経営数値・現場KPIを常に最新の状態でダッシュボード化。</p>
          </div>
        </div>

        <div class="sat br">
          <div class="icon-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px;">
              <circle cx="9" cy="8" r="3.5"/><path d="M2.5 20 v-1 a5.5 4.5 0 0 1 13 0 v1"/><circle cx="17.5" cy="9" r="3"/><path d="M16 15.5 a5 4.5 0 0 1 5.5 4.5 v0.5"/>
            </svg>
          </div>
          <div>
            <h3>チーム連携</h3>
            <p>部門を越えて同じデータを共有し、判断のズレをなくす。</p>
          </div>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
