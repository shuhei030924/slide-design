<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 53 年間カレンダー型
使うべきタイミング: 「年間スケジュール」「年間の施策一覧」「行事予定」。12ヶ月グリッドで1年の施策・イベントを見渡す。マーケ計画・研修計画・採用計画など。
向かないケース: タスク×期間の工程管理(→㉗ガント型)、四半期マイルストーン(→⑧ロードマップ型)
-->
<head>
<meta charset="UTF-8">
<title>年間カレンダー型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }
  :root {
    --bg: #fffaf3;
    --surface: #ffffff;
    --surface-2: #ffedd5;
    --border: #f3e3cf;
    --ink: #431f0e;
    --text: #6b4a35;
    --sub: #a1836f;
    --accent: #f97316;
    --accent-2: #fbbf24;
    --grad: linear-gradient(120deg, #f97316, #fbbf24);
  }
  .deco { position: absolute; border-radius: 50%; pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 54px 80px 50px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .title-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; }
  .slide-title {
    font-size: 36px; font-weight: 900;
    color: var(--ink); line-height: 1.35;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .legend { display: flex; gap: 20px; font-size: 12.5px; color: var(--sub); }
  .lg { display: flex; align-items: center; gap: 7px; }
  .lg .dot { width: 9px; height: 9px; border-radius: 50%; }

  .cal {
    flex: 1; min-height: 0;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    margin-bottom: 22px;
  }
  .month {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 1px 3px rgba(67, 31, 14, 0.04);
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .m-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .m-name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .m-q {
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
    color: var(--accent);
    background: var(--surface-2);
    padding: 2px 8px; border-radius: 999px;
  }
  .ev {
    display: flex; align-items: flex-start; gap: 7px;
    font-size: 11.5px; color: var(--text); line-height: 1.45;
    margin-bottom: 6px;
  }
  .ev .dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .dot.mk { background: var(--accent); }
  .dot.org { background: var(--accent-2); }

  .footer {
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 16px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco" style="width: 360px; height: 360px; top: -160px; right: -110px; background: #fde8c8;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Annual Plan 2027</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <div class="title-row">
        <h1 class="slide-title">2027年の施策を、<em>この1枚</em>で見渡す。</h1>
        <div class="legend">
          <span class="lg"><span class="dot" style="background: var(--accent);"></span>マーケ・イベント</span>
          <span class="lg"><span class="dot" style="background: var(--accent-2);"></span>組織・採用</span>
        </div>
      </div>

      <div class="cal">
        <div class="month">
          <div class="m-head"><span class="m-name">1月</span><span class="m-q">Q1</span></div>
          <div class="ev"><span class="dot org"></span>期初キックオフ</div>
          <div class="ev"><span class="dot mk"></span>新春キャンペーン</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">2月</span></div>
          <div class="ev"><span class="dot mk"></span>業界展示会に出展</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">3月</span></div>
          <div class="ev"><span class="dot org"></span>新卒受け入れ準備</div>
          <div class="ev"><span class="dot mk"></span>期末導入相談会</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">4月</span><span class="m-q">Q2</span></div>
          <div class="ev"><span class="dot org"></span>新卒入社・研修</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">5月</span></div>
          <div class="ev"><span class="dot mk"></span>ユーザー会 #1</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">6月</span></div>
          <div class="ev"><span class="dot org"></span>上期中間レビュー</div>
          <div class="ev"><span class="dot mk"></span>導入事例ウェビナー</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">7月</span><span class="m-q">Q3</span></div>
          <div class="ev"><span class="dot mk"></span>夏季キャンペーン</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">8月</span></div>
          <div class="ev"><span class="dot org"></span>サマーインターン</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">9月</span></div>
          <div class="ev"><span class="dot mk"></span>年次カンファレンス</div>
          <div class="ev"><span class="dot org"></span>中途採用強化月間</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">10月</span><span class="m-q">Q4</span></div>
          <div class="ev"><span class="dot org"></span>下期キックオフ</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">11月</span></div>
          <div class="ev"><span class="dot mk"></span>ユーザー会 #2</div>
        </div>
        <div class="month">
          <div class="m-head"><span class="m-name">12月</span></div>
          <div class="ev"><span class="dot org"></span>年間総括・表彰式</div>
          <div class="ev"><span class="dot mk"></span>年末感謝キャンペーン</div>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
