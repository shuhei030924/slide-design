<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 63 売上ブリッジ・ウォーターフォール型(ミッドナイトグリーン、増減要因の浮動バー)
使うべきタイミング: 「売上の内訳変化」「増減要因の説明」「前年比の要因分解」。決算・月次報告で、前期→当期の変化を複数の増減要因に分解して見せたいとき。
向かないケース: ある時点の構成比(→構成比型)、時系列の推移そのもの(→グラフ型)
図の約束: 浮動バーで増減を表現。緑=増加要因、アンバー=減少要因、グレー=開始/終了の合計値(design-guideの診断系配色の例外を適用)
-->
<head>
<meta charset="UTF-8">
<title>売上ブリッジ・ウォーターフォール型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0b0f1a;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  :root {
    --bg: #0c1222;
    --surface: rgba(255,255,255,0.04);
    --surface-2: rgba(52,211,153,0.10);
    --border: rgba(255,255,255,0.09);
    --ink: #f1f5f9;
    --text: #cbd5e1;
    --sub: #94a3b8;
    --accent: #34d399;
    --accent-2: #38bdf8;
    --grad: linear-gradient(120deg, #34d399, #38bdf8);
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 52px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 32px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 4px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .legend { flex-shrink: 0; display: flex; gap: 24px; font-size: 12.5px; color: var(--sub); margin-bottom: 4px; }
  .legend .lg { display: flex; align-items: center; gap: 7px; }
  .legend .dot { width: 9px; height: 9px; border-radius: 3px; }

  .chart-wrap { flex: 1; min-height: 0; display: flex; align-items: center; }
  .chart-wrap svg { width: 100%; height: 100%; }

  .cat-row { display: flex; margin-bottom: 22px; }
  .cat-col { flex: 1; text-align: center; padding: 0 6px; }
  .cat-col .c-name { font-size: 12.5px; font-weight: 700; color: var(--ink); line-height: 1.4; }

  .footer {
    flex-shrink: 0;
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="glow" style="width: 460px; height: 460px; top: -200px; right: -140px; background: rgba(52,211,153,0.12);"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Revenue Bridge</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可(白抜き推奨) -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">売上は前年比<em>+31%</em>。伸びの内訳を4要因で説明する。</h1>

      <div class="legend">
        <span class="lg"><span class="dot" style="background:#34d399;"></span>増加要因</span>
        <span class="lg"><span class="dot" style="background:#d97706;"></span>減少要因</span>
        <span class="lg"><span class="dot" style="background:#64748b;"></span>合計値</span>
      </div>

      <div class="chart-wrap">
        <!-- ウォーターフォール: viewBox 1050x300。baseY=280,plotH=200,maxV=1100(単位:百万円)。scale=200/1100
             値の推移: 0→800(前年)→890(+90)→960(+70)→920(-40)→1050(+130,今期)
             バー: 幅120,step160, x=60,220,380,540,700,860 -->
        <svg viewBox="0 0 1050 300" preserveAspectRatio="none">
          <line x1="0" y1="280" x2="1050" y2="280" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

          <!-- 接続線(前段の終点=次段の始点) -->
          <line x1="180" y1="134.5" x2="220" y2="134.5" stroke="rgba(148,163,184,0.4)" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="340" y1="118.2" x2="380" y2="118.2" stroke="rgba(148,163,184,0.4)" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="500" y1="105.5" x2="540" y2="105.5" stroke="rgba(148,163,184,0.4)" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="660" y1="112.7" x2="700" y2="112.7" stroke="rgba(148,163,184,0.4)" stroke-width="1.5" stroke-dasharray="4 4"/>
          <line x1="820" y1="89.1"  x2="860" y2="89.1"  stroke="rgba(148,163,184,0.4)" stroke-width="1.5" stroke-dasharray="4 4"/>

          <!-- バー0: 前年売上(合計, 0→800) -->
          <rect x="60"  y="134.5" width="120" height="145.5" rx="4" fill="#64748b"/>
          <text x="120" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">¥800M</text>

          <!-- バー1: +新規顧客獲得(800→890) -->
          <rect x="220" y="118.2" width="120" height="16.3" rx="3" fill="#34d399"/>
          <text x="280" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#34d399">+¥90M</text>

          <!-- バー2: +既存顧客の単価UP(890→960) -->
          <rect x="380" y="105.5" width="120" height="12.7" rx="3" fill="#34d399"/>
          <text x="440" y="93" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#34d399">+¥70M</text>

          <!-- バー3: 解約による減少(960→920) -->
          <rect x="540" y="105.5" width="120" height="7.2" rx="3" fill="#d97706"/>
          <text x="600" y="93" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#d97706">▲¥40M</text>

          <!-- バー4: +新規事業(920→1050) -->
          <rect x="700" y="89.1" width="120" height="23.6" rx="3" fill="#34d399"/>
          <text x="760" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#34d399">+¥130M</text>

          <!-- バー5: 今期売上(合計, 0→1050) -->
          <rect x="860" y="89.1" width="120" height="190.9" rx="4" fill="#64748b"/>
          <text x="920" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">¥1,050M</text>
        </svg>
      </div>

      <div class="cat-row">
        <div class="cat-col"><div class="c-name">前年売上</div></div>
        <div class="cat-col"><div class="c-name">新規顧客<br>獲得</div></div>
        <div class="cat-col"><div class="c-name">既存顧客の<br>単価UP</div></div>
        <div class="cat-col"><div class="c-name">解約による<br>減少</div></div>
        <div class="cat-col"><div class="c-name">新規事業</div></div>
        <div class="cat-col"><div class="c-name">今期売上</div></div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
