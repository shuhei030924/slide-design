<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㊽ ビジネスモデル相関図型
使うべきタイミング: 「ビジネスモデル」「収益の仕組み」「お金の流れ」。登場プレイヤー間の価値とお金の交換を図解する。IR・事業紹介・提案の背景説明。
向かないケース: サービス機能の全体像(→⑳ソリューション型)、技術構成(→⑮システム構成図型)
図の約束: 実線(アクセント色)=お金の流れ / 破線(グレー)=価値・サービスの流れ
-->
<head>
<meta charset="UTF-8">
<title>ビジネスモデル相関図型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  }
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-2: #eff6ff;
    --border: #e2e8f0;
    --ink: #0f172a;
    --text: #334155;
    --sub: #64748b;
    --accent: #2563eb;
    --accent-2: #0ea5e9;
    --grad: linear-gradient(120deg, #2563eb, #0ea5e9);
  }
  .deco { position: absolute; border-radius: 50%; background: var(--accent); opacity: 0.05; pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 56px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 38px; font-weight: 900;
    color: var(--ink); line-height: 1.35;
    margin-bottom: 26px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .diagram { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
  .diagram svg { width: 1020px; }
  .legend { display: flex; gap: 32px; font-size: 12.5px; color: var(--sub); margin-bottom: 26px; }
  .legend .lg { display: flex; align-items: center; gap: 8px; }
  .lg .line { width: 28px; height: 0; border-top: 2.5px solid var(--accent); }
  .lg .line.dash { border-top: 2px dashed #94a3b8; }

  .notes { flex: 1; display: flex; gap: 24px; align-items: flex-start; min-height: 0; margin-bottom: 24px; }
  .note {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 24px;
  }
  .note h3 { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 6px; display: flex; align-items: center; gap: 9px; }
  .note h3::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--grad); flex-shrink: 0; }
  .note p { font-size: 13px; color: var(--sub); line-height: 1.7; }

  .footer {
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco" style="width: 420px; height: 420px; top: -170px; right: -130px;"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Business Model</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">収益の柱は、顧客からの<em>月額利用料</em>。</h1>

      <div class="diagram">
        <!-- 相関図: 箱w=200,h=80,y=70(中心y=110)。ギャップ中心=290/610。矢印は上段y=95(価値・破線)/下段y=130(お金・実線) -->
        <svg viewBox="0 0 900 220">
          <defs>
            <marker id="bm-money" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
            </marker>
            <marker id="bm-value" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
            </marker>
            <linearGradient id="bm-g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#0ea5e9"/>
            </linearGradient>
          </defs>

          <!-- 顧客企業: x=30..230 中心(130,110) 17px → y=110+6≈116 -->
          <rect x="30" y="70" width="200" height="80" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
          <text x="130" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">顧客企業</text>
          <text x="130" y="132" text-anchor="middle" font-size="12" fill="#64748b">中堅〜大企業 2,400社</text>

          <!-- 自社: x=350..550 中心(450,110) -->
          <rect x="350" y="70" width="200" height="80" rx="16" fill="url(#bm-g)"/>
          <text x="450" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#ffffff">YOUR COMPANY</text>
          <text x="450" y="132" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">SaaS提供・導入支援</text>

          <!-- パートナー企業: x=670..870 中心(770,110) -->
          <rect x="670" y="70" width="200" height="80" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
          <text x="770" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">パートナー企業</text>
          <text x="770" y="132" text-anchor="middle" font-size="12" fill="#64748b">SIer・代理店 60社</text>

          <!-- 自社→顧客(価値・破線): (346,95)→(238,95) ラベル上 y=86 中心x=290 -->
          <line x1="346" y1="95" x2="238" y2="95" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#bm-value)"/>
          <text x="290" y="60" text-anchor="middle" font-size="12.5" fill="#64748b">サービス提供</text>

          <!-- 顧客→自社(お金・実線): (234,130)→(342,130) ラベル下 y=162 -->
          <line x1="234" y1="130" x2="342" y2="130" stroke="#2563eb" stroke-width="2.5" marker-end="url(#bm-money)"/>
          <text x="290" y="170" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2563eb">月額利用料</text>

          <!-- パートナー→自社(価値・破線): (666,95)→(558,95) ラベル上 中心x=610 -->
          <line x1="666" y1="95" x2="558" y2="95" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#bm-value)"/>
          <text x="610" y="60" text-anchor="middle" font-size="12.5" fill="#64748b">顧客の紹介・導入代行</text>

          <!-- 自社→パートナー(お金・実線): (554,130)→(662,130) ラベル下 -->
          <line x1="554" y1="130" x2="662" y2="130" stroke="#2563eb" stroke-width="2.5" marker-end="url(#bm-money)"/>
          <text x="610" y="170" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2563eb">紹介手数料</text>
        </svg>
        <div class="legend">
          <span class="lg"><span class="line"></span>お金の流れ</span>
          <span class="lg"><span class="line dash"></span>価値・サービスの流れ</span>
        </div>
      </div>

      <div class="notes">
        <div class="note">
          <h3>ストック収益が土台</h3>
          <p>売上の62%が月額利用料。解約率0.8%/月で、収益の予見性が高い。</p>
        </div>
        <div class="note">
          <h3>パートナーが成長エンジン</h3>
          <p>新規契約の4割がパートナー経由。自社営業を増やさず商圏を拡大できる。</p>
        </div>
        <div class="note">
          <h3>獲得コストを抑制</h3>
          <p>紹介経由は広告経由に比べ獲得コストが1/3。手数料を払っても利益率が高い。</p>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
