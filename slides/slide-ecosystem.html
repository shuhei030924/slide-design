<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 55 エコシステム・連携パートナー型(ダーク×放射状ハブ、連携アイコン6枠)
使うべきタイミング: 「連携先」「エコシステム」「〜と連携」「API連携」。自社プロダクトを中心に周辺ツール・パートナーとのつながりを見せたいとき。SaaS紹介・技術提案向け。
向かないケース: サービス機能そのものの全体像(→ソリューション型)、お金の流れの説明(→ビジネスモデル相関図型)
図の約束: 中心=自社プロダクト、周囲6枠=連携カテゴリ(実際のツール名・ロゴは差し替えて使う)
-->
<head>
<meta charset="UTF-8">
<title>エコシステム・連携パートナー型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0b0f1a;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  :root {
    --bg: #0c1222;
    --surface: rgba(255,255,255,0.04);
    --surface-2: rgba(56,189,248,0.08);
    --border: rgba(255,255,255,0.09);
    --ink: #f1f5f9;
    --text: #cbd5e1;
    --sub: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #818cf8;
    --grad: linear-gradient(120deg, #38bdf8, #818cf8);
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 52px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 34px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 4px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .diagram { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
  .diagram svg { height: 100%; max-height: 380px; }

  .notes { flex-shrink: 0; display: flex; gap: 20px; margin-top: 6px; margin-bottom: 22px; }
  .note {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 22px;
  }
  .note h3 { font-size: 14.5px; font-weight: 700; color: var(--ink); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .note h3::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--grad); flex-shrink: 0; }
  .note p { font-size: 12px; color: var(--sub); line-height: 1.6; }

  .footer {
    flex-shrink: 0;
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="glow" style="width: 480px; height: 480px; top: -200px; right: -140px; background: rgba(56,189,248,0.14);"></div>
    <div class="glow" style="width: 460px; height: 460px; bottom: -220px; left: -140px; background: rgba(129,140,248,0.13);"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Ecosystem</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可(白抜き推奨) -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">60以上のツールと<em>API連携</em>、業務を止めない。</h1>

      <div class="diagram">
        <!-- 放射状ハブ: viewBox 700x480、hub中心(350,240)r=80。ノード半径190、60°間隔(-90開始) -->
        <svg viewBox="0 0 700 480">
          <defs>
            <linearGradient id="eco-hub" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
            <linearGradient id="eco-chip" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
          </defs>

          <!-- 接続線: hub円周(r=80)からchip中心手前まで、各ノード座標: (350,50)(514.5,145)(514.5,335)(350,430)(185.5,335)(185.5,145) -->
          <line x1="350"   y1="160" x2="350"   y2="68"  stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="419"   y1="200" x2="497"   y2="153" stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="419"   y1="280" x2="497"   y2="327" stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="350"   y1="320" x2="350"   y2="412" stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="281"   y1="280" x2="203"   y2="327" stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="281"   y1="200" x2="203"   y2="153" stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="5 6"/>

          <!-- ハブ -->
          <circle cx="350" cy="240" r="80" fill="url(#eco-hub)"/>
          <text x="350" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#0c1222">YOUR PRODUCT</text>
          <text x="350" y="256" text-anchor="middle" font-size="11.5" fill="rgba(12,18,34,0.75)">API連携基盤</text>

          <!-- 連携チップ(36x36, rx8)+ラベル(下18px) -->
          <g>
            <rect x="332" y="32" width="36" height="36" rx="8" fill="url(#eco-chip)"/>
            <g fill="#ffffff"><rect x="337" y="37" width="9" height="9"/><rect x="349" y="37" width="9" height="9"/><rect x="337" y="49" width="9" height="9"/><rect x="349" y="49" width="9" height="9"/></g>
            <text x="350" y="84" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f1f5f9">チャット</text>
          </g>
          <g>
            <rect x="496.5" y="127" width="36" height="36" rx="8" fill="url(#eco-chip)"/>
            <g fill="#ffffff"><rect x="501.5" y="132" width="9" height="9"/><rect x="513.5" y="132" width="9" height="9"/><rect x="501.5" y="144" width="9" height="9"/><rect x="513.5" y="144" width="9" height="9"/></g>
            <text x="514.5" y="179" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f1f5f9">CRM</text>
          </g>
          <g>
            <rect x="496.5" y="317" width="36" height="36" rx="8" fill="url(#eco-chip)"/>
            <g fill="#ffffff"><rect x="501.5" y="322" width="9" height="9"/><rect x="513.5" y="322" width="9" height="9"/><rect x="501.5" y="334" width="9" height="9"/><rect x="513.5" y="334" width="9" height="9"/></g>
            <text x="514.5" y="369" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f1f5f9">会計</text>
          </g>
          <g>
            <rect x="332" y="412" width="36" height="36" rx="8" fill="url(#eco-chip)"/>
            <g fill="#ffffff"><rect x="337" y="417" width="9" height="9"/><rect x="349" y="417" width="9" height="9"/><rect x="337" y="429" width="9" height="9"/><rect x="349" y="429" width="9" height="9"/></g>
            <text x="350" y="464" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f1f5f9">カレンダー</text>
          </g>
          <g>
            <rect x="167.5" y="317" width="36" height="36" rx="8" fill="url(#eco-chip)"/>
            <g fill="#ffffff"><rect x="172.5" y="322" width="9" height="9"/><rect x="184.5" y="322" width="9" height="9"/><rect x="172.5" y="334" width="9" height="9"/><rect x="184.5" y="334" width="9" height="9"/></g>
            <text x="185.5" y="369" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f1f5f9">ストレージ</text>
          </g>
          <g>
            <rect x="167.5" y="127" width="36" height="36" rx="8" fill="url(#eco-chip)"/>
            <g fill="#ffffff"><rect x="172.5" y="132" width="9" height="9"/><rect x="184.5" y="132" width="9" height="9"/><rect x="172.5" y="144" width="9" height="9"/><rect x="184.5" y="144" width="9" height="9"/></g>
            <text x="185.5" y="179" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f1f5f9">認証(SSO)</text>
          </g>
        </svg>
      </div>

      <div class="notes">
        <div class="note">
          <h3>ノーコードで接続</h3>
          <p>エンジニア不要。管理画面からクリックだけで連携を設定できる。</p>
        </div>
        <div class="note">
          <h3>5分でセットアップ</h3>
          <p>認証を通すだけで即日利用開始。段階的な移行にも対応。</p>
        </div>
        <div class="note">
          <h3>SOC2 Type2準拠</h3>
          <p>連携先とのデータやり取りは全て暗号化。監査済みの安全設計。</p>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
