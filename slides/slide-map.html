<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 54 拠点・グローバル展開型(ダーク×ハブ&スポーク、海外拠点マップ)
使うべきタイミング: 「海外展開」「グローバル拠点」「進出国一覧」。本社を中心に地域拠点へ広がる体制を図解したいとき。IR・採用・会社紹介向け。
向かないケース: 国内拠点のみの体制図(→組織図型)、市場規模の説明(→市場規模型)
図の約束: 中心=本社(HQ)、四方の拠点は方位ではなく地域を表す抽象配置。実際の地図・座標とは対応しない。
-->
<head>
<meta charset="UTF-8">
<title>拠点・グローバル展開型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0b0f1a;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  :root {
    --bg: #0c1222;
    --surface: rgba(255,255,255,0.04);
    --surface-2: rgba(56,189,248,0.08);
    --border: rgba(255,255,255,0.09);
    --ink: #f1f5f9;
    --text: #cbd5e1;
    --sub: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #818cf8;
    --grad: linear-gradient(120deg, #38bdf8, #818cf8);
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 52px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 34px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 6px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .diagram { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
  .diagram svg { width: 640px; height: 100%; max-height: 320px; }

  .regions { flex-shrink: 0; display: flex; gap: 16px; margin-top: 8px; margin-bottom: 22px; }
  .region {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px;
  }
  .region-name { font-size: 14.5px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .region-name::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--grad); flex-shrink: 0; }
  .region-detail { font-size: 12px; color: var(--sub); margin-top: 6px; line-height: 1.7; }
  .region-detail strong { color: var(--text); font-weight: 600; }

  .footer {
    flex-shrink: 0;
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="glow" style="width: 480px; height: 480px; top: -200px; left: -140px; background: rgba(56,189,248,0.14);"></div>
    <div class="glow" style="width: 460px; height: 460px; bottom: -220px; right: -140px; background: rgba(129,140,248,0.13);"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Global Expansion</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可(白抜き推奨) -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">拠点は<em>4極体制</em>に。32カ国でサービスを提供。</h1>

      <div class="diagram">
        <!-- ハブ&スポーク: viewBox 700x400、hub中心(350,200)r=70。水平半径280(左右)・垂直半径150(上下) -->
        <svg viewBox="0 0 700 400">
          <defs>
            <linearGradient id="map-hub" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
          </defs>

          <!-- 接続線: hub円周(半径70)からnode手前まで -->
          <line x1="350" y1="130" x2="350" y2="65"  stroke="rgba(148,163,184,0.35)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="420" y1="200" x2="615" y2="200" stroke="rgba(148,163,184,0.35)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="350" y1="270" x2="350" y2="335" stroke="rgba(148,163,184,0.35)" stroke-width="2" stroke-dasharray="5 6"/>
          <line x1="280" y1="200" x2="85"  y2="200" stroke="rgba(148,163,184,0.35)" stroke-width="2" stroke-dasharray="5 6"/>

          <!-- ハブ: 本社 -->
          <circle cx="350" cy="200" r="70" fill="url(#map-hub)"/>
          <!-- テキスト中央: y=200-6+16*0.35≈200(2行の上段) -->
          <text x="350" y="196" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="800" fill="#0c1222">HQ</text>
          <text x="350" y="216" text-anchor="middle" font-size="12.5" fill="rgba(12,18,34,0.75)">東京本社</text>

          <!-- ノード: 半径10。ラベルは外側に1行 -->
          <circle cx="350" cy="50" r="10" fill="#38bdf8"/>
          <text x="350" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">APAC</text>

          <circle cx="630" cy="200" r="10" fill="#818cf8"/>
          <text x="650" y="205" text-anchor="start" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Americas</text>

          <circle cx="350" cy="350" r="10" fill="#38bdf8"/>
          <text x="350" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Europe</text>

          <circle cx="70" cy="200" r="10" fill="#818cf8"/>
          <text x="50" y="205" text-anchor="end" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">MEA</text>
        </svg>
      </div>

      <div class="regions">
        <div class="region">
          <div class="region-name">APAC</div>
          <div class="region-detail"><strong>シンガポール</strong>拠点・2019年設立・8カ国</div>
        </div>
        <div class="region">
          <div class="region-name">Americas</div>
          <div class="region-detail"><strong>ニューヨーク</strong>拠点・2021年設立・6カ国</div>
        </div>
        <div class="region">
          <div class="region-name">Europe</div>
          <div class="region-detail"><strong>ロンドン</strong>拠点・2022年設立・10カ国</div>
        </div>
        <div class="region">
          <div class="region-name">MEA</div>
          <div class="region-detail"><strong>ドバイ</strong>拠点・2024年設立・8カ国</div>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
