<!DOCTYPE html>
<html lang="ja">
<!--
パターン: 61 プロダクトUIショーケース型(ダーク×ブラウザフレーム、機能訴求+画面モック)
使うべきタイミング: 「プロダクトツアー」「画面を見せたい」「UIの使いやすさを訴求」。SaaS紹介・製品デモでブラウザ風フレームに製品画面(または簡易モック)を収めて見せたいとき。
向かないケース: 機能の全体像を図解したい(→ソリューション型)、実際のスクリーンショットがない場合の抽象的な価値訴求(→ビジネス型)
備考: `.mock-*` 内は抽象モック。実際のスクリーンショットがある場合は `.browser-body` の中身を `<img src="..." style="width:100%;height:100%;object-fit:cover;">` に差し替える
-->
<head>
<meta charset="UTF-8">
<title>プロダクトUIショーケース型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0b0f1a;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    overflow: hidden; position: relative;
    background: var(--bg);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  :root {
    --bg: #0c1222;
    --surface: rgba(255,255,255,0.04);
    --surface-2: rgba(56,189,248,0.08);
    --border: rgba(255,255,255,0.09);
    --ink: #f1f5f9;
    --text: #cbd5e1;
    --sub: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #818cf8;
    --grad: linear-gradient(120deg, #38bdf8, #818cf8);
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none; }

  .slide-inner {
    position: relative; z-index: 1;
    height: 100%; padding: 52px 80px;
    display: flex; flex-direction: column;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent);
  }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--ink); }

  .slide-title {
    font-size: 32px; font-weight: 900;
    color: var(--ink); line-height: 1.4;
    margin-bottom: 24px;
  }
  .slide-title em { font-style: normal; color: var(--accent); }

  .body-row { flex: 1; min-height: 0; display: flex; gap: 36px; margin-bottom: 24px; }

  .features { flex: 0 0 300px; display: flex; flex-direction: column; gap: 18px; justify-content: center; }
  .feature { display: flex; gap: 14px; align-items: flex-start; }
  .f-icon {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
  }
  .feature h3 { font-size: 14.5px; font-weight: 700; color: var(--ink); }
  .feature p { font-size: 12px; color: var(--sub); margin-top: 3px; line-height: 1.6; }

  .browser-frame {
    flex: 1; min-width: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .browser-topbar {
    flex-shrink: 0; height: 34px; display: flex; align-items: center; gap: 7px;
    padding: 0 14px; background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }
  .b-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .b-url { flex: 1; margin-left: 8px; height: 18px; border-radius: 5px; background: rgba(255,255,255,0.05); }

  .browser-body { flex: 1; min-height: 0; display: flex; gap: 14px; padding: 16px; }
  .mock-sidebar { flex: 0 0 76px; background: var(--surface-2); border-radius: 8px; padding: 10px 8px; display: flex; flex-direction: column; gap: 6px; }
  .mock-nav { height: 9px; border-radius: 4px; background: rgba(255,255,255,0.10); }
  .mock-nav.active { background: var(--grad); }

  .mock-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
  .mock-header { height: 12px; width: 40%; border-radius: 4px; background: rgba(255,255,255,0.12); }
  .mock-cards { display: flex; gap: 10px; }
  .mock-card { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  .mock-card .m-label { height: 6px; width: 60%; border-radius: 3px; background: rgba(255,255,255,0.15); margin-bottom: 8px; }
  .mock-card .m-value { height: 14px; width: 45%; border-radius: 4px; background: var(--accent); }
  .mock-chart { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: flex-end; gap: 8px; padding: 14px; }
  .mock-bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--grad); }

  .footer {
    flex-shrink: 0;
    font-size: 12px; color: var(--sub); letter-spacing: 0.15em;
    padding-top: 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="glow" style="width: 460px; height: 460px; top: -200px; left: -140px; background: rgba(56,189,248,0.13);"></div>

    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Product Tour</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可(白抜き推奨) -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;">
            <path d="M20 4 L36 32 H4 Z" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="5" fill="var(--accent)"/>
          </svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">現場の声から生まれた、<em>直感操作</em>のUI。</h1>

      <div class="body-row">
        <div class="features">
          <div class="feature">
            <span class="f-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;"><path d="M13 2 L3 14h7l-1 8 10-12h-7z"/></svg></span>
            <div>
              <h3>3クリックで完了</h3>
              <p>よく使う操作を最短導線に再設計</p>
            </div>
          </div>
          <div class="feature">
            <span class="f-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M8 4v14"/></svg></span>
            <div>
              <h3>ドラッグ&ドロップ対応</h3>
              <p>並び替え・移動を直感的に操作できる</p>
            </div>
          </div>
          <div class="feature">
            <span class="f-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;"><path d="M4 4v16h16"/><path d="M8 15l4-5 3 3 5-7"/></svg></span>
            <div>
              <h3>リアルタイム更新</h3>
              <p>複数人での同時編集をそのまま反映</p>
            </div>
          </div>
        </div>

        <div class="browser-frame">
          <div class="browser-topbar">
            <span class="b-dot"></span><span class="b-dot"></span><span class="b-dot"></span>
            <div class="b-url"></div>
          </div>
          <div class="browser-body">
            <div class="mock-sidebar">
              <div class="mock-nav active"></div>
              <div class="mock-nav"></div>
              <div class="mock-nav"></div>
              <div class="mock-nav"></div>
              <div class="mock-nav"></div>
            </div>
            <div class="mock-main">
              <div class="mock-header"></div>
              <div class="mock-cards">
                <div class="mock-card"><div class="m-label"></div><div class="m-value" style="width:70%;"></div></div>
                <div class="mock-card"><div class="m-label"></div><div class="m-value" style="width:55%;"></div></div>
                <div class="mock-card"><div class="m-label"></div><div class="m-value" style="width:60%;"></div></div>
              </div>
              <div class="mock-chart">
                <div class="mock-bar" style="height:40%;"></div>
                <div class="mock-bar" style="height:60%;"></div>
                <div class="mock-bar" style="height:50%;"></div>
                <div class="mock-bar" style="height:78%;"></div>
                <div class="mock-bar" style="height:65%;"></div>
                <div class="mock-bar" style="height:90%;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <span>YOUR COMPANY INC.</span>
        <span>2026.07</span>
      </div>
    </div>
  </div>
</body>
</html>
