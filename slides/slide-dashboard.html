<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉘ ダッシュボード型(ダーク×マルチカラー、KPI+ミニチャート)
使うべきタイミング: 複数の指標を一望させたいとき。月次報告・経営会議の状況サマリー。「ダッシュボード」「実績一覧」系の依頼。
向かないケース: 1つの数値を強く訴求(→KPI型へ)、1つのデータを深掘り(→グラフ型へ)
-->
<head>
<meta charset="UTF-8">
<title>ダッシュボード型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #1c1c1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #111827; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .slide-inner { height: 100%; padding: 52px 68px; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .kicker { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.35em; color: #818cf8; text-transform: uppercase; }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo svg, .logo img { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: #e5e7eb; }
  .slide-title { font-size: 34px; font-weight: 900; color: #f9fafb; margin-bottom: 22px; }
  .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 18px; }
  .card {
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    padding: 22px 26px;
    display: flex; flex-direction: column;
  }
  .card.wide { grid-column: span 2; }
  .c-label { font-size: 13px; font-weight: 500; color: #9ca3af; margin-bottom: 8px; }
  .c-value { font-family: 'Inter', sans-serif; font-size: 40px; font-weight: 800; color: #f9fafb; white-space: nowrap; line-height: 1.1; }
  .c-value small { font-size: 18px; font-weight: 600; color: #6b7280; }
  .c-trend { font-size: 12.5px; font-weight: 700; margin-top: 8px; }
  .up { color: #34d399; } .down { color: #f87171; }
  .c-chart { flex: 1; display: flex; align-items: flex-end; margin-top: 10px; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Monthly Report — 2026.06</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可(白抜き推奨) -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#818cf8" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#818cf8"/></svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">月次ハイライト</h1>

      <div class="grid">
        <div class="card wide">
          <div class="c-label">MRR(月次経常収益)の推移</div>
          <div class="c-value">¥84.2M</div>
          <div class="c-trend up">▲ +6.2% 前月比</div>
          <div class="c-chart">
            <!-- 折れ線: x=20+i*68, y=90-v (v: 30,38,42,40,52,58,66,74) -->
            <svg viewBox="0 0 520 100" style="width: 100%; height: 76px;">
              <polyline points="20,60 88,52 156,48 224,50 292,38 360,32 428,24 496,16"
                        fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="496" cy="16" r="5" fill="#818cf8"/>
            </svg>
          </div>
        </div>

        <div class="card">
          <div class="c-label">新規契約</div>
          <div class="c-value">42<small> 社</small></div>
          <div class="c-trend up">▲ +8社 前月比</div>
          <div class="c-chart">
            <!-- ミニ棒: 6本 x=10+i*36 w=24, baseY=70 -->
            <svg viewBox="0 0 230 74" style="width: 100%; height: 60px;">
              <rect x="10"  y="42" width="24" height="28" rx="4" fill="#374151"/>
              <rect x="46"  y="36" width="24" height="34" rx="4" fill="#374151"/>
              <rect x="82"  y="44" width="24" height="26" rx="4" fill="#374151"/>
              <rect x="118" y="30" width="24" height="40" rx="4" fill="#374151"/>
              <rect x="154" y="24" width="24" height="46" rx="4" fill="#4b5563"/>
              <rect x="190" y="12" width="24" height="58" rx="4" fill="#818cf8"/>
            </svg>
          </div>
        </div>

        <div class="card">
          <div class="c-label">解約率(チャーン)</div>
          <div class="c-value">0.8<small> %</small></div>
          <div class="c-trend up">▲ 0.3pt 改善</div>
        </div>

        <div class="card">
          <div class="c-label">NPS(顧客推奨度)</div>
          <div class="c-value">+52</div>
          <div class="c-trend up">▲ +4pt 前四半期比</div>
        </div>

        <div class="card">
          <div class="c-label">目標達成率</div>
          <div class="c-chart" style="align-items: center; justify-content: center; margin-top: 0;">
            <!-- ドーナツ: r=44, 円周=276.5, 92% → 254.4 -->
            <svg viewBox="0 0 120 120" style="height: 104px;">
              <circle cx="60" cy="60" r="44" fill="none" stroke="#374151" stroke-width="12"/>
              <circle cx="60" cy="60" r="44" fill="none" stroke="#34d399" stroke-width="12"
                      stroke-dasharray="254.4 276.5" stroke-linecap="round" transform="rotate(-90 60 60)"/>
              <text x="60" y="70" text-anchor="middle" font-size="26" font-weight="800" fill="#f9fafb">92%</text>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
