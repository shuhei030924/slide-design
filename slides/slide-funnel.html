<!DOCTYPE html>
<html lang="ja">
<!--
パターン: ㉓ ファネル型(白×ティール→ブルー、逆三角ファネル)
使うべきタイミング: 集客→成約などの段階的な絞り込み・転換率を見せたいとき。マーケ・営業プロセスの説明。「ファネル」「コンバージョン」系。
向かないケース: 転換の概念がない手順(→フロー型へ)
-->
<head>
<meta charset="UTF-8">
<title>ファネル型スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: #ffffff; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  :root { --main: #134e4a; --accent: #0d9488; --text: #475569; }
  .slide-inner { height: 100%; padding: 56px 72px; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .kicker { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; }
  .logo { height: 38px; max-width: 220px; display: flex; align-items: center; }
  .logo svg, .logo img { height: 100%; max-width: 100%; object-fit: contain; }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; color: var(--main); }
  .slide-title { font-size: 38px; font-weight: 900; color: var(--main); margin-bottom: 14px; }
  .body { flex: 1; display: flex; gap: 48px; align-items: center; }
  .funnel { flex: 1.1; }
  .insights { flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .ins {
    padding: 20px 24px; border-radius: 14px;
    background: #f0fdfa; border-left: 5px solid var(--accent);
  }
  .ins-title { font-size: 17px; font-weight: 700; color: var(--main); margin-bottom: 4px; }
  .ins-desc { font-size: 14px; line-height: 1.75; color: var(--text); }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="topbar">
        <span class="kicker">Funnel</span>
        <!-- ★会社ロゴ: <img src="../images/logo.png" alt="会社ロゴ"> に差し替え可 -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" style="width: 32px; margin-right: 9px;"><path d="M20 4 L36 32 H4 Z" stroke="#0d9488" stroke-width="2.5" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" fill="#0d9488"/></svg>
          <span class="logo-text">YOUR LOGO</span>
        </div>
      </div>

      <h1 class="slide-title">リード獲得から成約までの流れ</h1>

      <div class="body">
        <div class="funnel">
          <!--
            ファネル (viewBox 0 0 560 460): 台形4段、各高さ92、間隔12
            段i: 上辺幅 w_top、下辺幅 w_bottom を左右対称に。中心 x=280
            1段目: 520→400 / 2段目: 400→290 / 3段目: 290→190 / 4段目: 190→120
          -->
          <svg viewBox="0 0 560 460" style="width: 100%;">
            <polygon points="20,10 540,10 480,102 80,102" fill="#5eead4"/>
            <polygon points="85,114 475,114 420,206 140,206" fill="#2dd4bf"/>
            <polygon points="135,218 425,218 375,310 185,310" fill="#14b8a6"/>
            <polygon points="185,322 375,322 340,414 220,414" fill="#0f766e"/>
            <text x="280" y="50"  text-anchor="middle" font-size="17" font-weight="700" fill="#134e4a">サイト訪問  120,000</text>
            <text x="280" y="88"  text-anchor="middle" font-size="13" fill="#134e4a">オーガニック+広告</text>
            <text x="280" y="156" text-anchor="middle" font-size="17" font-weight="700" fill="#0f3d38">資料請求  6,000(5.0%)</text>
            <text x="280" y="192" text-anchor="middle" font-size="13" fill="#0f3d38">ホワイトペーパー・セミナー</text>
            <text x="280" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">商談化  1,200(20%)</text>
            <text x="280" y="296" text-anchor="middle" font-size="13" fill="#ccfbf1">インサイドセールス</text>
            <text x="280" y="364" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">成約  300(25%)</text>
            <text x="280" y="400" text-anchor="middle" font-size="13" fill="#ccfbf1">フィールドセールス</text>
          </svg>
        </div>

        <div class="insights">
          <div class="ins">
            <div class="ins-title">訪問→資料請求 5.0%</div>
            <p class="ins-desc">業界平均(2%)の2.5倍。コンテンツ施策が機能。</p>
          </div>
          <div class="ins">
            <div class="ins-title">最大のボトルネックは商談化</div>
            <p class="ins-desc">資料請求からの商談化20%を、ナーチャリング強化で30%へ引き上げる。</p>
          </div>
          <div class="ins">
            <div class="ins-title">年間成約 300社ペース</div>
            <p class="ins-desc">現体制で対応可能な上限に接近。CS採用を並行して推進。</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
